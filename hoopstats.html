function wirePlayerDetail(playerId) {
  document.querySelectorAll('button[data-go]').forEach(btn => {
    btn.addEventListener('click', () => go({ name: btn.dataset.go }));
  });

  const seasonSel = document.getElementById('player-season-filter');
  if (seasonSel) {
    seasonSel.addEventListener('change', () => {
      view.seasonFilter = seasonSel.value;
      render();
    });
  }

  const player = byId(playerId);
  if (!player) return;
  const allMyGames = playerGames(player.id);
  const filter = view.seasonFilter || '__all__';
  const myGames = allMyGames.filter(x => {
    if (filter === '__all__')  return true;
    if (filter === '__none__') return !x.game.seasonId;
    return x.game.seasonId === filter;
  });
  const sorted = [...myGames].sort((a, b) => {
    const dd = +new Date(a.game.playedAt) - +new Date(b.game.playedAt);
    return dd !== 0 ? dd : (a.game.order || 1) - (b.game.order || 1);
  });

  // Recompute shot-type labels from this player's games (same logic as renderPlayerDetail).
  const scoringsUsedW = new Set(sorted.map(x => x.game.scoring || '1-2'));
  let shortLblW = 'Short', longLblW = 'Long';
  if (scoringsUsedW.size === 1) {
    const vw = pointValues([...scoringsUsedW][0]);
    shortLblW = `${vw.short}PT`;
    longLblW  = `${vw.long}PT`;
  }

  const statLabels = {
    total:     'FG%',
    short:     shortLblW + ' FG%',
    long:      longLblW  + ' FG%',
    contShort: 'Cont. ' + shortLblW + ' FG%',
    contLong:  'Cont. ' + longLblW  + ' FG%',
  };

  function buildChart(statKey) {
    // Highlight active stat-type button.
    document.querySelectorAll('button[data-chart-stat]').forEach(btn => {
      const active = btn.dataset.chartStat === statKey;
      btn.classList.toggle('bg-indigo-700', active);
      btn.classList.toggle('text-white',    active);
      btn.classList.toggle('bg-gray-100',   !active);
      btn.classList.toggle('text-gray-600', !active);
      btn.classList.toggle('hover:bg-gray-200', !active);
    });

    // Highlight active view-toggle button.
    const chartView = view.chartView || 'game';
    document.querySelectorAll('button[data-chart-view]').forEach(btn => {
      const active = btn.dataset.chartView === chartView;
      btn.classList.toggle('bg-gray-700',   active);
      btn.classList.toggle('text-white',    active);
      btn.classList.toggle('bg-gray-100',   !active);
      btn.classList.toggle('text-gray-600', !active);
      btn.classList.toggle('hover:bg-gray-200', !active);
    });

    // Pull per-game raw made/att values (filter games where the stat had any attempts).
    const rawPts = sorted.map(x => {
      const s = statShape(x.stat, x.game);
      let made, att;
      switch (statKey) {
        case 'short':     made = s.shortMade;     att = s.shortAtt;     break;
        case 'long':      made = s.longMade;      att = s.longAtt;      break;
        case 'contShort': made = s.contShortMade; att = s.contShortAtt; break;
        case 'contLong':  made = s.contLongMade;  att = s.contLongAtt;  break;
        default:          made = s.fgm;           att = s.fga;          break;
      }
      return {
        date: new Date(x.game.playedAt).toLocaleDateString(undefined, { month: 'short', day: 'numeric' }),
        gameOrder: x.game.order || 1,
        made, att,
      };
    }).filter(p => p.att > 0);

    // Aggregate per-day if requested: sum made+att for all games on the same day.
    let pts;
    if (chartView === 'day') {
      const dayMap = new Map();
      for (const p of rawPts) {
        if (!dayMap.has(p.date)) dayMap.set(p.date, { made: 0, att: 0 });
        dayMap.get(p.date).made += p.made;
        dayMap.get(p.date).att  += p.att;
      }
      pts = [...dayMap.entries()].map(([date, { made, att }]) => ({
        date,
        value: att ? (made / att) * 100 : null,
      })).filter(p => p.value !== null);
    } else {
      // Per-game: if multiple games share the same date label, append "#N" to distinguish.
      const dateCounts = new Map();
      for (const p of rawPts) dateCounts.set(p.date, (dateCounts.get(p.date) || 0) + 1);
      pts = rawPts.map(p => ({
        date: dateCounts.get(p.date) > 1 ? `${p.date} #${p.gameOrder}` : p.date,
        value: (p.made / p.att) * 100,
      }));
    }

    const canvas  = document.getElementById('trend-chart');
    const noData  = document.getElementById('chart-no-data');
    if (!canvas) return;

    if (chart) { chart.destroy(); chart = null; }

    if (pts.length < 2) {
      if (noData) noData.classList.remove('hidden');
      canvas.style.display = 'none';
      return;
    }
    if (noData) noData.classList.add('hidden');
    canvas.style.display = '';

    // Linear regression.
    const xs    = pts.map((_, i) => i);
    const ys    = pts.map(p => p.value);
    const nPts  = xs.length;
    const sumX  = xs.reduce((a, b) => a + b, 0);
    const sumY  = ys.reduce((a, b) => a + b, 0);
    const sumXY = xs.reduce((a, xi, i) => a + xi * ys[i], 0);
    const sumXX = xs.reduce((a, xi) => a + xi * xi, 0);
    const den   = nPts * sumXX - sumX * sumX || 1;
    const slope = (nPts * sumXY - sumX * sumY) / den;
    const intercept = (sumY - slope * sumX) / nPts;
    const trendLine = xs.map(xi => slope * xi + intercept);

    chart = new Chart(canvas, {
      type: 'line',
      data: {
        labels: pts.map(p => p.date),
        datasets: [
          { label: statLabels[statKey] || 'FG%', data: pts.map(p => p.value), borderColor: player.color, backgroundColor: player.color + '20', tension: 0.2, pointRadius: 4, pointHoverRadius: 6, fill: true },
          { label: 'Trend', data: trendLine, borderColor: '#ef4444', borderDash: [6, 4], pointRadius: 0, fill: false },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: { y: { min: 0, max: 100, ticks: { callback: v => v + '%' } } },
        plugins: {
          legend: { display: true, position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } },
          tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y.toFixed(1)}%` } },
        },
      },
    });
  }

  // Wire stat-type toggle buttons.
  document.querySelectorAll('button[data-chart-stat]').forEach(btn => {
    btn.addEventListener('click', () => {
      view.chartStat = btn.dataset.chartStat;
      buildChart(view.chartStat);
    });
  });

  // Wire per-game / per-day view toggle buttons.
  document.querySelectorAll('button[data-chart-view]').forEach(btn => {
    btn.addEventListener('click', () => {
      view.chartView = btn.dataset.chartView;
      buildChart(view.chartStat || 'total');
    });
  });

  // Draw initial chart.
  buildChart(view.chartStat || 'total');
}

function wireImport() {
  document.querySelectorAll('button[data-go]').forEach(btn => {
    btn.addEventListener('click', () => go({ name: btn.dataset.go }));
  });

  // Template download
  const tplBtn = document.getElementById('csv-template-btn');
  if (tplBtn) tplBtn.addEventListener('click', downloadCsvTemplate);

  // CSV file upload
  const csvFile = document.getElementById('csv-file');
  const csvPick = document.getElementById('csv-pick-btn');
  if (csvPick && csvFile) {
    csvPick.addEventListener('click', () => csvFile.click());
    csvFile.addEventListener('change', async () => {
      const f = csvFile.files?.[0];
      if (!f) return;
      const text = await f.text();
      importState.csvText = text;
      importState.parsed = parseAnyCsv(text);
      render();
    });
  }

  // Live edit of the CSV textarea
  const csvText = document.getElementById('csv-text');
  if (csvText) {
    csvText.addEventListener('input', () => { importState.csvText = csvText.value; });
  }

  // Parse button
  const parseBtn = document.getElementById('csv-parse-btn');
  if (parseBtn) parseBtn.addEventListener('click', () => {
    importState.parsed = parseAnyCsv(importState.csvText);
    render();
  });

  // Clear button
  const clearBtn = document.getElementById('csv-clear-btn');
  if (clearBtn) clearBtn.addEventListener('click', () => {
    importState.csvText = '';
    importState.parsed = null;
    render();
  });

  // Commit button
  const commitBtn = document.getElementById('csv-commit-btn');
  if (commitBtn) commitBtn.addEventListener('click', () => {
    if (!importState.parsed) return;
    const summary = commitImportedGames(importState.parsed);
    importState.lastImportSummary = summary;
    importState.csvText = '';
    importState.parsed = null;
    saveState();
    render();
  });

  // Image upload
  const ocrFile = document.getElementById('ocr-file');
  const ocrPick = document.getElementById('ocr-pick-btn');
  if (ocrPick && ocrFile) {
    ocrPick.addEventListener('click', () => ocrFile.click());
    ocrFile.addEventListener('change', async () => {
      const f = ocrFile.files?.[0];
      if (!f) return;
      const reader = new FileReader();
      reader.onload = async () => {
        importState.imageDataUrl = reader.result;
        importState.ocrText = '';
        importState.ocrError = '';
        render();
        await runOcr(f);
      };
      reader.readAsDataURL(f);
    });
  }

  const rerun = document.getElementById('ocr-rerun-btn');
  if (rerun) rerun.addEventListener('click', async () => {
    if (!importState.imageDataUrl) return;
    // Convert data URL back to a Blob for Tesseract
    const blob = await (await fetch(importState.imageDataUrl)).blob();
    await runOcr(blob);
  });

  const ocrText = document.getElementById('ocr-text');
  if (ocrText) {
    ocrText.addEventListener('input', () => { importState.ocrText = ocrText.value; });
  }

  const sendBtn = document.getElementById('ocr-to-csv-btn');
  if (sendBtn) sendBtn.addEventListener('click', () => {
    importState.csvText = (importState.csvText ? importState.csvText.trimEnd() + '\n' : '') + (importState.ocrText || '');
    render();
  });

  const ocrClear = document.getElementById('ocr-clear-btn');
  if (ocrClear) ocrClear.addEventListener('click', () => {
    importState.imageDataUrl = null;
    importState.ocrText = '';
    importState.ocrStatus = '';
    importState.ocrError = '';
    render();
  });
}

// --- CSV parser ---------------------------------------------------------
function parseCsv(text) {
  const rows = [];
  let cur = [];
  let cell = '';
  let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"' && text[i+1] === '"') { cell += '"'; i++; continue; }
      if (c === '"') { inQuotes = false; continue; }
      cell += c;
      continue;
    }
    if (c === '"') { inQuotes = true; continue; }
    if (c === ',') { cur.push(cell); cell = ''; continue; }
    if (c === '\r') continue;
    if (c === '\n') { cur.push(cell); rows.push(cur); cur = []; cell = ''; continue; }
    cell += c;
  }
  if (cell.length > 0 || cur.length > 0) { cur.push(cell); rows.push(cur); }
  return rows.filter(r => r.some(c => c && c.trim().length > 0));
}

// --- Combined wide-format report parser ---------------------------------
// Detects exports like "Basketball Game Stats — Combined Report": one row per
// game, with each player's stats laid out in their own block of columns across
// the row (player name spans a header row, stat labels in the row beneath it).
function looksLikeCombinedReport(rows) {
  if (rows.length < 3) return false;
  const r0 = (rows[0]?.[0] || '');
  const r1 = (rows[1]?.[0] || '');
  // Two known layouts:
  //  - title row "Basketball Game Stats — Combined Report" then a "GAME INFORMATION" name row
  //  - "GAME INFORMATION" itself doubles as the name row's first cell (no separate title row)
  return /combined report/i.test(r0) || /game information/i.test(r1) || /game information/i.test(r0);
}

function parseCombinedReportCsv(rows) {
  const errors = [];

  // The "GAME INFORMATION" row is the player-name row — it may be row 0 (no title row above it)
  // or row 1 (with a "Basketball Game Stats — Combined Report" title row above it).
  let nameRowIdx = rows.findIndex((r, i) => i < 3 && /game information/i.test((r?.[0] || '')));
  if (nameRowIdx < 0) nameRowIdx = 1; // fall back to the previously-assumed layout

  if (rows.length < nameRowIdx + 3) {
    return { games: [], errors: ['Combined report needs a player-name row, a stat-header row, and at least one game row.'] };
  }

  const nameRow   = rows[nameRowIdx];     // player names spanning column groups
  const headerRow = rows[nameRowIdx + 1]; // per-column stat labels (Game ID, Date, ... 1Pt Att, 1Pt Made, ...)

  // Find where the per-player column blocks start: first non-empty name after col 0.
  let firstPlayerCol = -1;
  for (let c = 1; c < nameRow.length; c++) {
    if ((nameRow[c] || '').trim()) { firstPlayerCol = c; break; }
  }
  if (firstPlayerCol < 0) return { games: [], errors: ['Could not find player-name columns (row 2).'] };

  // Carve the row into per-player blocks based on where each name starts.
  const playerBlocks = [];
  for (let c = firstPlayerCol; c < nameRow.length; c++) {
    const name = (nameRow[c] || '').trim();
    if (name) {
      if (playerBlocks.length) playerBlocks[playerBlocks.length - 1].end = c;
      playerBlocks.push({ name, start: c, end: nameRow.length });
    }
  }
  if (!playerBlocks.length) return { games: [], errors: ['No player columns found (row 2).'] };

  // Map each block's stat-label columns to our internal keys (template = first block).
  const STAT_LABELS = {
    '1pt att': 'shortAtt', '1pt made': 'shortMade',
    'c1pt att': 'contShortAtt', 'c1pt made': 'contShortMade',
    '2pt att': 'longAtt',  '2pt made': 'longMade',
    'c2pt att': 'contLongAtt', 'c2pt made': 'contLongMade',
    'reb off': 'offReb',   'reb def':  'defReb',
    'assists': 'ast', 'steals': 'stl', 'blocks': 'blk', 'tos': 'to',
  };
  const offsets = {};
  const tmpl = playerBlocks[0];
  for (let c = tmpl.start; c < tmpl.end; c++) {
    const lbl = (headerRow[c] || '').trim().toLowerCase();
    if (STAT_LABELS[lbl] !== undefined) offsets[STAT_LABELS[lbl]] = c - tmpl.start;
  }
  if (offsets.shortAtt === undefined) {
    return { games: [], errors: ['Could not find a "1Pt Att" column inside a player block (row 3).'] };
  }

  // Game-info column lookup (everything left of the first player block).
  const giIdx = {};
  for (let c = 0; c < firstPlayerCol; c++) {
    giIdx[(headerRow[c] || '').trim().toLowerCase()] = c;
  }
  const col = (row, label) => giIdx[label] != null ? (row[giIdx[label]] || '').trim() : '';

  const hasOffReb = offsets.offReb !== undefined;
  const hasDefReb = offsets.defReb !== undefined;
  const hasContested = offsets.contShortAtt !== undefined || offsets.contShortMade !== undefined
    || offsets.contLongAtt !== undefined || offsets.contLongMade !== undefined;
  const hasAst = offsets.ast !== undefined;
  const hasStl = offsets.stl !== undefined;
  const hasBlk = offsets.blk !== undefined;
  const hasTo  = offsets.to  !== undefined;

  const num = s => { const v = parseInt(s, 10); return Number.isNaN(v) ? 0 : v; };
  const orderByDate = new Map();
  const games = [];

  for (let r = nameRowIdx + 2; r < rows.length; r++) {
    const row = rows[r];
    if (!row || row.every(c => !c || !c.trim())) continue;

    const gameId    = col(row, 'game id');
    const dateRaw   = col(row, 'date');
    const typeRaw   = col(row, 'type');
    const type      = ['1v1','2v2','3v3','4v4','5v5'].includes(typeRaw) ? typeRaw : '2v2';
    const team1Raw  = col(row, 'team 1');
    const team2Raw  = col(row, 'team 2');
    const scoreA    = num(col(row, 't1 score'));
    const scoreB    = num(col(row, 't2 score'));
    const winnerRaw = col(row, 'winner');

    if (!dateRaw) { errors.push(`Row ${r + 1}: missing date — skipped`); continue; }

    // M/D/YYYY -> YYYY-MM-DD
    const dm = dateRaw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    const playedAt = dm ? `${dm[3]}-${dm[1].padStart(2, '0')}-${dm[2].padStart(2, '0')}` : dateRaw;

    const team1Names = team1Raw.split(',').map(s => s.trim().toLowerCase()).filter(Boolean);
    const team2Names = team2Raw.split(',').map(s => s.trim().toLowerCase()).filter(Boolean);
    const wKey = winnerRaw.trim().toLowerCase().replace(/[\s_]+/g, '_');
    const winner = wKey === 'team_1' ? 'A' : (wKey === 'team_2' ? 'B' : (wKey === 'tie' ? 'Tie' : ''));

    const gRows = [];
    for (const pb of playerBlocks) {
      const get = key => offsets[key] !== undefined ? (row[pb.start + offsets[key]] || '').trim() : '';
      const rawShortAtt = get('shortAtt');
      if (!rawShortAtt || rawShortAtt === '—' || rawShortAtt === '-') continue; // dashes = didn't play this game

      const lname = pb.name.trim().toLowerCase();
      let team = team1Names.includes(lname) ? 'A' : (team2Names.includes(lname) ? 'B' : '');
      if (!team) { errors.push(`Row ${r + 1}: couldn't match player "${pb.name}" to a team roster — skipped`); continue; }

      gRows.push({
        player: pb.name, team,
        shortMade: num(get('shortMade')), shortAtt: num(get('shortAtt')),
        longMade:  num(get('longMade')),  longAtt:  num(get('longAtt')),
        contShortMade: offsets.contShortMade !== undefined ? num(get('contShortMade')) : null,
        contShortAtt:  offsets.contShortAtt  !== undefined ? num(get('contShortAtt'))  : null,
        contLongMade:  offsets.contLongMade  !== undefined ? num(get('contLongMade'))  : null,
        contLongAtt:   offsets.contLongAtt   !== undefined ? num(get('contLongAtt'))   : null,
        offReb: num(get('offReb')), defReb: num(get('defReb')),
        ast: num(get('ast')), stl: num(get('stl')), blk: num(get('blk')), to: num(get('to')),
        zoneCloseMade: null, zoneCloseAtt: null, zoneMidMade: null, zoneMidAtt: null, zoneLongMade: null, zoneLongAtt: null,
        contZoneCloseMade: null, contZoneCloseAtt: null, contZoneMidMade: null, contZoneMidAtt: null, contZoneLongMade: null, contZoneLongAtt: null,
      });
    }

    if (gRows.length < 2) { errors.push(`Row ${r + 1}: fewer than 2 players matched a team roster — skipped`); continue; }

    const ord = (orderByDate.get(playedAt) || 0) + 1;
    orderByDate.set(playedAt, ord);

    games.push({
      playedAt,
      order: ord,
      scoreA, scoreB,
      winner,
      season: '',
      scoring: '1-2',
      format: type,
      target: 21,
      notes: gameId ? `Imported from combined report — Game ID ${gameId}` : '',
      rows: gRows,
      tracked: {
        contested: hasContested,
        rebounds: hasOffReb || hasDefReb,
        ast: hasAst, stl: hasStl, blk: hasBlk, to: hasTo,
        zones: false,
      },
    });
  }

  return { games, errors };
}

// Auto-detect which CSV shape we're given and parse accordingly.
function parseAnyCsv(text) {
  const rows = parseCsv(text);
  return looksLikeCombinedReport(rows) ? parseCombinedReportCsv(rows) : processCsvRows(rows);
}

function processCsvRows(rows) {
  if (rows.length < 2) return { games: [], errors: ['Need a header row and at least one data row.'] };
  const headers = rows[0].map(h => h.trim().toLowerCase());
  const findCol = (...names) => {
    for (const n of names) {
      const i = headers.indexOf(n.toLowerCase());
      if (i >= 0) return i;
    }
    return -1;
  };
  const errors = [];
  const required = [
    ['date'], ['player'], ['team'], ['scorea','score_a','score a'], ['scoreb','score_b','score b'],
    ['shortmade','short_made','short made'], ['shortatt','short_att','short attempts'],
    ['longmade','long_made'], ['longatt','long_att'],
  ];
  for (const aliases of required) {
    if (!aliases.some(a => headers.includes(a))) {
      errors.push(`Missing required column: ${aliases[0]}`);
    }
  }
  if (errors.length) return { games: [], errors };

  const idx = {
    date: findCol('date'),
    player: findCol('player','name'),
    team: findCol('team'),
    scoreA: findCol('scorea','score_a','score a'),
    scoreB: findCol('scoreb','score_b','score b'),
    season: findCol('season'),
    scoring: findCol('scoring'),
    format: findCol('format'),
    target: findCol('target','rulescore','rule_score'),
    notes: findCol('notes'),
    gameKey: findCol('game_key','gamekey'),
    shortMade: findCol('shortmade','short_made'),
    shortAtt:  findCol('shortatt','short_att'),
    longMade:  findCol('longmade','long_made'),
    longAtt:   findCol('longatt','long_att'),
    contShortMade: findCol('contshortmade','cont_short_made','cont_shortmade'),
    contShortAtt:  findCol('contshortatt','cont_short_att','cont_shortatt'),
    contLongMade:  findCol('contlongmade','cont_long_made','cont_longmade'),
    contLongAtt:   findCol('contlongatt','cont_long_att','cont_longatt'),
    offReb: findCol('offreb','off_reb','offensive_rebounds','off rebounds'),
    defReb: findCol('defreb','def_reb','defensive_rebounds','def rebounds'),
    ast: findCol('ast','assists'),
    stl: findCol('stl','steals'),
    blk: findCol('blk','blocks'),
    to:  findCol('to','tov','turnover','turnovers'),
  };

  const cellAt = (row, key) => idx[key] >= 0 ? (row[idx[key]] || '').trim() : '';
  const numOrNull = s => s === '' ? null : (Number.isNaN(parseInt(s)) ? null : parseInt(s));

  const gameMap = new Map();
  for (let i = 1; i < rows.length; i++) {
    const row = rows[i];
    const date = cellAt(row, 'date');
    const player = cellAt(row, 'player');
    const team = cellAt(row, 'team').toUpperCase();
    const scoreA = parseInt(cellAt(row, 'scoreA')) || 0;
    const scoreB = parseInt(cellAt(row, 'scoreB')) || 0;
    if (!date) { errors.push(`Row ${i+1}: missing date`); continue; }
    if (!player) { errors.push(`Row ${i+1}: missing player`); continue; }
    if (!['A','B'].includes(team)) { errors.push(`Row ${i+1}: team must be A or B (got "${team}")`); continue; }

    const key = idx.gameKey >= 0 && cellAt(row, 'gameKey')
      ? cellAt(row, 'gameKey')
      : `${date}|${scoreA}|${scoreB}`;

    if (!gameMap.has(key)) {
      gameMap.set(key, {
        playedAt: date,
        scoreA, scoreB,
        season:  cellAt(row, 'season'),
        scoring: (cellAt(row, 'scoring') || '1-2'),
        format:  (cellAt(row, 'format')  || '2v2'),
        target:  parseInt(cellAt(row, 'target')) || 21,
        notes:   cellAt(row, 'notes'),
        rows: [],
      });
    }
    const g = gameMap.get(key);
    g.rows.push({
      player, team,
      shortMade: numOrNull(cellAt(row, 'shortMade')) ?? 0,
      shortAtt:  numOrNull(cellAt(row, 'shortAtt'))  ?? 0,
      longMade:  numOrNull(cellAt(row, 'longMade'))  ?? 0,
      longAtt:   numOrNull(cellAt(row, 'longAtt'))   ?? 0,
      contShortMade: numOrNull(cellAt(row, 'contShortMade')),
      contShortAtt:  numOrNull(cellAt(row, 'contShortAtt')),
      contLongMade:  numOrNull(cellAt(row, 'contLongMade')),
      contLongAtt:   numOrNull(cellAt(row, 'contLongAtt')),
      offReb: numOrNull(cellAt(row, 'offReb')),
      defReb: numOrNull(cellAt(row, 'defReb')),
      ast: numOrNull(cellAt(row, 'ast')),
      stl: numOrNull(cellAt(row, 'stl')),
      blk: numOrNull(cellAt(row, 'blk')),
      to:  numOrNull(cellAt(row, 'to')),
      // Zones (optional)
      zoneCloseMade: numOrNull(cellAt(row, 'zoneCloseMade')),
      zoneCloseAtt:  numOrNull(cellAt(row, 'zoneCloseAtt')),
      zoneMidMade:   numOrNull(cellAt(row, 'zoneMidMade')),
      zoneMidAtt:    numOrNull(cellAt(row, 'zoneMidAtt')),
      zoneLongMade:  numOrNull(cellAt(row, 'zoneLongMade')),
      zoneLongAtt:   numOrNull(cellAt(row, 'zoneLongAtt')),
      contZoneCloseMade: numOrNull(cellAt(row, 'contZoneCloseMade')),
      contZoneCloseAtt:  numOrNull(cellAt(row, 'contZoneCloseAtt')),
      contZoneMidMade:   numOrNull(cellAt(row, 'contZoneMidMade')),
      contZoneMidAtt:    numOrNull(cellAt(row, 'contZoneMidAtt')),
      contZoneLongMade:  numOrNull(cellAt(row, 'contZoneLongMade')),
      contZoneLongAtt:   numOrNull(cellAt(row, 'contZoneLongAtt')),
    });
  }

  const games = [];
  for (const [, g] of gameMap) {
    const anyContested = g.rows.some(r => r.contShortMade != null || r.contShortAtt != null || r.contLongMade != null || r.contLongAtt != null);
    const anyRebounds  = g.rows.some(r => r.offReb != null || r.defReb != null);
    const anyAst       = g.rows.some(r => r.ast != null);
    const anyStl       = g.rows.some(r => r.stl != null);
    const anyBlk       = g.rows.some(r => r.blk != null);
    const anyTo        = g.rows.some(r => r.to  != null);
    const anyZones     = g.rows.some(r =>
      r.zoneCloseMade != null || r.zoneCloseAtt != null ||
      r.zoneMidMade   != null || r.zoneMidAtt   != null ||
      r.zoneLongMade  != null || r.zoneLongAtt  != null ||
      r.contZoneCloseMade != null || r.contZoneCloseAtt != null ||
      r.contZoneMidMade   != null || r.contZoneMidAtt   != null ||
      r.contZoneLongMade  != null || r.contZoneLongAtt  != null);
    games.push({
      ...g,
      tracked: { contested: anyContested, rebounds: anyRebounds, ast: anyAst, stl: anyStl, blk: anyBlk, to: anyTo, zones: anyZones },
    });
  }

  return { games, errors };
}

function commitImportedGames(parsed) {
  const newPlayerNames = new Set();
  const matchedPlayerNames = new Set();   // "CSV name → existing player name" (fuzzy matches worth a heads-up)
  const ambiguousPlayerNames = new Set(); // CSV names that matched more than one existing player
  const newSeasonNames = new Set();
  let added = 0;

  const findOrCreatePlayer = name => {
    const n = name.trim();
    const nLower = n.toLowerCase();

    // 1. Exact full-name match (case-insensitive).
    let p = state.players.find(x => x.name.trim().toLowerCase() === nLower);

    // 2. Fuzzy match: CSV name equals a "word" in the player's full name (first/last/nickname),
    //    or matches their abbreviation. Handles imports that use short/first names (e.g. "ERCE")
    //    against a roster stored with full names (e.g. "Erce Savas").
    if (!p) {
      const candidates = state.players.filter(x => {
        const words = x.name.trim().toLowerCase().split(/\s+/).filter(Boolean);
        return words.includes(nLower) || (x.abbr || '').trim().toLowerCase() === nLower;
      });
      if (candidates.length === 1) {
        p = candidates[0];
        matchedPlayerNames.add(`${n} → ${p.name}`);
      } else if (candidates.length > 1) {
        // Ambiguous — prefer a player whose name *starts* with the CSV name (most likely the first name).
        p = candidates.find(x => x.name.trim().toLowerCase().startsWith(nLower)) || candidates[0];
        matchedPlayerNames.add(`${n} → ${p.name}`);
        ambiguousPlayerNames.add(n);
      }
    }

    if (!p) {
      p = {
        id: uid(),
        name: n,
        abbr: n.slice(0, 2).toUpperCase(),
        color: COLORS[state.players.length % COLORS.length],
        createdAt: new Date().toISOString(),
      };
      state.players.push(p);
      newPlayerNames.add(n);
    }
    return p;
  };

  const findOrCreateSeason = name => {
    const n = (name || '').trim();
    if (!n) return null;
    let s = state.seasons.find(x => x.name.toLowerCase() === n.toLowerCase());
    if (!s) {
      s = { id: uid(), name: n, createdAt: new Date().toISOString() };
      state.seasons.push(s);
      newSeasonNames.add(n);
    }
    return s.id;
  };

  for (const g of parsed.games) {
    const seasonId = findOrCreateSeason(g.season);
    const playedAt = g.playedAt.length === 10 ? g.playedAt + 'T12:00:00' : g.playedAt;
    const tr = g.tracked;
    state.games.push({
      id: uid(),
      playedAt: new Date(playedAt).toISOString(),
      order: g.order || 1,
      format: g.format || '2v2',
      scoring: g.scoring === '2-3' ? '2-3' : '1-2',
      ruleScore: g.target || 21,
      scoreA: g.scoreA,
      scoreB: g.scoreB,
      winner: g.winner || null,
      notes: g.notes || '',
      seasonId,
      tracked: { ...tr },
      stats: g.rows.map(r => ({
        playerId: findOrCreatePlayer(r.player).id,
        team: r.team,
        shortMade: r.shortMade || 0,
        shortAtt:  r.shortAtt  || 0,
        longMade:  r.longMade  || 0,
        longAtt:   r.longAtt   || 0,
        contShortMade: tr.contested ? (r.contShortMade || 0) : 0,
        contShortAtt:  tr.contested ? (r.contShortAtt  || 0) : 0,
        contLongMade:  tr.contested ? (r.contLongMade  || 0) : 0,
        contLongAtt:   tr.contested ? (r.contLongAtt   || 0) : 0,
        offReb: tr.rebounds ? (r.offReb || 0) : 0,
        defReb: tr.rebounds ? (r.defReb || 0) : 0,
        ast: tr.ast ? (r.ast || 0) : 0,
        stl: tr.stl ? (r.stl || 0) : 0,
        blk: tr.blk ? (r.blk || 0) : 0,
        to:  tr.to  ? (r.to  || 0) : 0,
        zoneCloseMade: tr.zones ? (r.zoneCloseMade || 0) : 0,
        zoneCloseAtt:  tr.zones ? (r.zoneCloseAtt  || 0) : 0,
        zoneMidMade:   tr.zones ? (r.zoneMidMade   || 0) : 0,
        zoneMidAtt:    tr.zones ? (r.zoneMidAtt    || 0) : 0,
        zoneLongMade:  tr.zones ? (r.zoneLongMade  || 0) : 0,
        zoneLongAtt:   tr.zones ? (r.zoneLongAtt   || 0) : 0,
        contZoneCloseMade: tr.zones ? (r.contZoneCloseMade || 0) : 0,
        contZoneCloseAtt:  tr.zones ? (r.contZoneCloseAtt  || 0) : 0,
        contZoneMidMade:   tr.zones ? (r.contZoneMidMade   || 0) : 0,
        contZoneMidAtt:    tr.zones ? (r.contZoneMidAtt    || 0) : 0,
        contZoneLongMade:  tr.zones ? (r.contZoneLongMade  || 0) : 0,
        contZoneLongAtt:   tr.zones ? (r.contZoneLongAtt   || 0) : 0,
      })),
    });
    added++;
  }

  const parts = [`Imported ${added} game${added===1?'':'s'}`];
  if (matchedPlayerNames.size) parts.push(`matched ${matchedPlayerNames.size} player name${matchedPlayerNames.size===1?'':'s'} to existing players (${[...matchedPlayerNames].join(', ')})`);
  if (newPlayerNames.size) parts.push(`created ${newPlayerNames.size} new player${newPlayerNames.size===1?'':'s'} (${[...newPlayerNames].join(', ')})`);
  if (newSeasonNames.size) parts.push(`created ${newSeasonNames.size} new season${newSeasonNames.size===1?'':'s'} (${[...newSeasonNames].join(', ')})`);
  let summary = parts.join(', ') + '.';
  if (ambiguousPlayerNames.size) {
    summary += ` ⚠ Heads up: ${[...ambiguousPlayerNames].join(', ')} matched more than one existing player — double-check those games picked the right person.`;
  }
  return summary;
}

function downloadCsvTemplate() {
  const headers = CSV_TEMPLATE_HEADERS;
  const samples = [
    // Sample game with zones tracked. Leave the zone columns blank if you don't want to track zones.
    ['2026-05-01','Summer 2026','1-2','3v3','21','A','RJ','21','15','example row','4','8','2','5','1','3','1','2','2','3','3','1','0','2',
      '2','3','1','3','1','2','0','1','1','2','0','1'],
    ['2026-05-01','Summer 2026','1-2','3v3','21','A','Mike','21','15','example row','3','6','1','4','0','2','0','1','1','2','2','0','0','1',
      '2','3','1','2','0','1','0','1','1','1','0','1'],
    ['2026-05-01','Summer 2026','1-2','3v3','21','B','Sam','21','15','example row','2','7','3','5','1','2','1','2','2','1','1','2','1','3',
      '1','3','0','2','1','2','0','1','0','1','0','1'],
    ['2026-05-01','Summer 2026','1-2','3v3','21','B','Lex','21','15','example row','4','9','1','3','0','1','0','1','0','3','2','1','0','2',
      '3','5','1','3','0','1','0','2','0','1','0','1'],
  ];

// --- OCR ----------------------------------------------------------------
function loadScript(src) {
  return new Promise((resolve, reject) => {
    if (document.querySelector(`script[src="${src}"]`)) return resolve();
    const s = document.createElement('script');
    s.src = src; s.onload = () => resolve(); s.onerror = () => reject(new Error('Failed to load ' + src));
    document.head.appendChild(s);
  });
}

async function runOcr(blobOrFile) {
  importState.ocrText = '';
  importState.ocrError = '';
  importState.ocrStatus = 'loading-lib';
  // Re-render this section only (avoid wiping the textarea while typing elsewhere is moot here)
  if (view.name === 'import') render();
  try {
    if (!window.Tesseract) {
      await loadScript('https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js');
    }
    importState.ocrStatus = 'running';
    if (view.name === 'import') render();
    const { data } = await window.Tesseract.recognize(blobOrFile, 'eng');
    importState.ocrText = data.text || '';
    importState.ocrStatus = 'done';
  } catch (e) {
    importState.ocrError = e.message || String(e);
    importState.ocrStatus = 'error';
  }
  if (view.name === 'import') render();
}

// ============================================================
// VIEW: Backup (export, import, snapshots)
// ============================================================
let backupState = {
  importError: '',
  importPreview: null, // { players, games, seasons, raw }
  message: '',
};

function renderBackup() {
  const snaps = loadSnapshots();
  const ts = new Date();
  const today = ts.toISOString().slice(0, 10);
  const counts = `${state.players.length} players · ${state.games.length} games · ${state.seasons.length} seasons`;

  const previewBlock = backupState.importPreview ? `
    <div class="mt-3 border border-amber-300 bg-amber-50 rounded-lg p-3 text-sm">
      <div class="font-medium text-amber-900 mb-1">Ready to restore</div>
      <div class="text-amber-900">
        ${backupState.importPreview.players.length} players ·
        ${backupState.importPreview.games.length} games ·
        ${backupState.importPreview.seasons.length} seasons
      </div>
      <div class="text-xs text-amber-800 mt-1">
        This will <strong>replace</strong> your current data. A snapshot of your current state will be saved first so you can undo it.
      </div>
      <div class="flex gap-2 mt-3">
        <button id="confirm-restore" class="px-3 py-1.5 bg-amber-600 text-white rounded text-sm hover:bg-amber-700">Replace data</button>
        <button id="cancel-restore" class="px-3 py-1.5 bg-white border border-gray-300 rounded text-sm hover:bg-gray-50">Cancel</button>
      </div>
    </div>` : '';

  const errBlock = backupState.importError
    ? `<div class="mt-3 text-sm text-red-700 bg-red-50 border border-red-200 rounded p-2">${backupState.importError}</div>`
    : '';

  const msgBlock = backupState.message
    ? `<div class="mt-3 text-sm text-emerald-700 bg-emerald-50 border border-emerald-200 rounded p-2">${backupState.message}</div>`
    : '';

  const snapsList = snaps.length === 0
    ? `<div class="text-sm text-gray-500 italic">No snapshots yet. One is saved automatically every time you change data.</div>`
    : `<ul class="divide-y divide-gray-200">
        ${snaps.map(s => {
          const d = new Date(s.ts);
          const when = d.toLocaleString();
          return `
            <li class="py-2 flex items-center gap-3">
              <div class="flex-1 min-w-0">
                <div class="text-sm font-medium text-gray-900">${when}</div>
                <div class="text-xs text-gray-500">${s.players} players · ${s.games} games · <span class="italic">${s.label}</span></div>
              </div>
              <button data-restore="${s.id}" class="px-2 py-1 text-xs bg-white border border-gray-300 rounded hover:bg-gray-50">Restore</button>
              <button data-snapdl="${s.id}" class="px-2 py-1 text-xs bg-white border border-gray-300 rounded hover:bg-gray-50">Download</button>
            </li>`;
        }).join('')}
      </ul>`;

  return `
    <div class="space-y-6">
      <div>
        <h2 class="text-lg font-semibold text-gray-900">Backup &amp; restore</h2>
        <p class="text-sm text-gray-600 mt-1">
          Your data lives in this browser. Export a JSON backup periodically and keep it in a safe spot
          (Drive, Dropbox, a thumb drive). You can restore from a backup file or from one of the recent in-browser snapshots below.
        </p>
        <div class="text-xs text-gray-500 mt-2">Currently in this browser: ${counts}</div>
      </div>

      <div class="bg-white border border-gray-200 rounded-lg p-4">
        <h3 class="text-sm font-semibold text-gray-900">Export backup</h3>
        <p class="text-xs text-gray-600 mt-1">Downloads a single JSON file containing all your players, games, and seasons.</p>
        <div class="flex flex-wrap gap-2 mt-3">
          <button id="btn-export" class="px-3 py-1.5 bg-blue-600 text-white rounded text-sm hover:bg-blue-700">
            Download backup (${today})
          </button>
          <button id="btn-copy" class="px-3 py-1.5 bg-white border border-gray-300 rounded text-sm hover:bg-gray-50">
            Copy JSON to clipboard
          </button>
        </div>
      </div>

      <div class="bg-white border border-gray-200 rounded-lg p-4">
        <h3 class="text-sm font-semibold text-gray-900">Restore from backup file</h3>
        <p class="text-xs text-gray-600 mt-1">Choose a previously exported <code class="text-xs bg-gray-100 px-1 rounded">.json</code> file. Your current data will be snapshotted before replacement.</p>
        <input type="file" id="restore-file" accept=".json,application/json" class="mt-2 text-sm">
        ${errBlock}
        ${previewBlock}
        ${msgBlock}
      </div>

      <div class="bg-white border border-gray-200 rounded-lg p-4">
        <h3 class="text-sm font-semibold text-gray-900">Snapshots <span class="text-xs font-normal text-gray-500">(last ${SNAPSHOT_CAP})</span></h3>
        <p class="text-xs text-gray-600 mt-1">Auto-saved every time data changes. Restore in one click if something goes wrong.</p>
        <div class="mt-3">${snapsList}</div>
        ${snaps.length > 0 ? `
          <div class="mt-3 pt-3 border-t border-gray-100">
            <button id="btn-clear-snaps" class="text-xs text-red-700 hover:underline">Clear all snapshots</button>
          </div>` : ''}
      </div>

      <details class="bg-gray-50 border border-gray-200 rounded-lg p-3 text-sm">
        <summary class="cursor-pointer text-gray-700 font-medium">How storage works (read me)</summary>
        <div class="mt-2 text-gray-700 space-y-1 text-xs leading-relaxed">
          <p>Hoopstats stores everything in this browser's <code>localStorage</code> on this device. That means:</p>
          <ul class="list-disc ml-5 space-y-1">
            <li>It's <strong>not</strong> automatically synced to your other devices.</li>
            <li>Clearing site data, switching browsers, or using a different machine = no data.</li>
            <li>Snapshots above also live in this browser — they protect against accidental edits, not browser wipes.</li>
          </ul>
          <p>Best practice: export a backup after each game (or every few games), keep the .json in cloud storage, and restore on any device when needed.</p>
        </div>
      </details>
    </div>`;
}

function wireBackup() {
  const $ = id => document.getElementById(id);

  const exportBtn = $('btn-export');
  if (exportBtn) exportBtn.addEventListener('click', () => downloadBackup());

  const copyBtn = $('btn-copy');
  if (copyBtn) copyBtn.addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(JSON.stringify(buildBackupPayload(), null, 2));
      backupState.message = 'Backup JSON copied to clipboard.';
      backupState.importError = '';
      render();
    } catch (e) {
      backupState.importError = 'Could not copy to clipboard: ' + (e.message || e);
      render();
    }
  });

  const fileEl = $('restore-file');
  if (fileEl) fileEl.addEventListener('change', async (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    try {
      const text = await f.text();
      const parsed = JSON.parse(text);
      const validated = validateBackupShape(parsed);
      if (validated.error) {
        backupState.importError = validated.error;
        backupState.importPreview = null;
      } else {
        backupState.importError = '';
        backupState.importPreview = validated.data;
        backupState.message = '';
      }
    } catch (err) {
      backupState.importError = 'Could not read file: ' + (err.message || err);
      backupState.importPreview = null;
    }
    render();
  });

  const confirmBtn = $('confirm-restore');
  if (confirmBtn) confirmBtn.addEventListener('click', () => {
    if (!backupState.importPreview) return;
    // snapshot current first, with a clear label
    pushSnapshot('before-restore');
    state = {
      players: backupState.importPreview.players,
      games:   backupState.importPreview.games,
      seasons: backupState.importPreview.seasons,
    };
    saveState({ label: 'after-restore' });
    backupState.message = `Restored ${state.games.length} games, ${state.players.length} players.`;
    backupState.importPreview = null;
    backupState.importError = '';
    render();
  });

  const cancelBtn = $('cancel-restore');
  if (cancelBtn) cancelBtn.addEventListener('click', () => {
    backupState.importPreview = null;
    backupState.importError = '';
    render();
  });

  document.querySelectorAll('button[data-restore]').forEach(btn => {
    btn.addEventListener('click', () => restoreSnapshot(btn.dataset.restore));
  });
  document.querySelectorAll('button[data-snapdl]').forEach(btn => {
    btn.addEventListener('click', () => downloadSnapshot(btn.dataset.snapdl));
  });

  const clearBtn = $('btn-clear-snaps');
  if (clearBtn) clearBtn.addEventListener('click', () => {
    if (!confirm('Delete all snapshots? Your current data is not affected.')) return;
    saveSnapshots([]);
    render();
  });
}

function buildBackupPayload() {
  return {
    schema: 'hoopstats',
    version: SCHEMA_VERSION,
    exportedAt: new Date().toISOString(),
    players: state.players,
    games: state.games,
    seasons: state.seasons,
  };
}

function downloadBackup() {
  const payload = buildBackupPayload();
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const today = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = `hoopstats-backup-${today}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  backupState.message = `Downloaded hoopstats-backup-${today}.json`;
  backupState.importError = '';
  render();
}

function downloadSnapshot(snapId) {
  const snaps = loadSnapshots();
  const snap = snaps.find(s => s.id === snapId);
  if (!snap) return;
  const payload = {
    schema: 'hoopstats',
    version: SCHEMA_VERSION,
    exportedAt: new Date(snap.ts).toISOString(),
    snapshotLabel: snap.label,
    players: snap.state.players || [],
    games: snap.state.games || [],
    seasons: snap.state.seasons || [],
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date(snap.ts).toISOString().replace(/[:.]/g, '-').slice(0, 19);
  a.href = url;
  a.download = `hoopstats-snapshot-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function restoreSnapshot(snapId) {
  const snaps = loadSnapshots();
  const snap = snaps.find(s => s.id === snapId);
  if (!snap) return;
  const when = new Date(snap.ts).toLocaleString();
  if (!confirm(`Restore snapshot from ${when}? Your current data will be saved as a new snapshot first.`)) return;
  pushSnapshot('before-snap-restore');
  state = {
    players: Array.isArray(snap.state.players) ? snap.state.players : [],
    games:   Array.isArray(snap.state.games)   ? snap.state.games   : [],
    seasons: Array.isArray(snap.state.seasons) ? snap.state.seasons : [],
  };
  saveState({ label: 'after-snap-restore' });
  backupState.message = `Restored snapshot from ${when}.`;
  render();
}

function validateBackupShape(parsed) {
  if (!parsed || typeof parsed !== 'object') {
    return { error: 'File is not a valid JSON object.' };
  }
  if (parsed.schema && parsed.schema !== 'hoopstats') {
    return { error: `Unexpected schema "${parsed.schema}". Expected "hoopstats".` };
  }
  const players = Array.isArray(parsed.players) ? parsed.players : null;
  const games   = Array.isArray(parsed.games)   ? parsed.games   : null;
  const seasons = Array.isArray(parsed.seasons) ? parsed.seasons : [];
  if (!players || !games) {
    return { error: 'Backup is missing required fields (players, games).' };
  }
  // light shape validation
  for (const p of players) {
    if (!p || typeof p.id !== 'string' || typeof p.name !== 'string') {
      return { error: 'Players list contains an invalid entry.' };
    }
  }
  for (const g of games) {
    if (!g || typeof g.id !== 'string' || !Array.isArray(g.stats)) {
      return { error: 'Games list contains an invalid entry.' };
    }
  }
  return { data: { players, games, seasons } };
}

// ============================================================
// Helpers
// ============================================================
function byId(playerId) {
  return state.players.find(p => p.id === playerId);
}

function playerGames(playerId) {
  const out = [];
  for (const g of state.games) {
    const stat = g.stats.find(s => s.playerId === playerId);
    if (stat) out.push({ game: g, stat });
  }
  return out;
}

function playerChip(p) {
  return `<span class="inline-flex items-center justify-center w-6 h-6 rounded-full text-[10px] font-semibold"
                style="background:${p.color}20; color:${p.color};"
                title="${escapeHtml(p.name)}">${escapeHtml(p.abbr || p.name.slice(0,2).toUpperCase())}</span>`;
}

function escapeHtml(s) {
  return String(s ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

render();
</script>
