<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hoopstats — local prototype</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }
  .stat-input {
    width: 3.25rem; text-align: center; padding: 0.3rem 0.25rem; font-size: 0.875rem;
    border: 1px solid #d1d5db; border-radius: 0.25rem; background: white;
  }
  .stat-input:focus { border-color: #2563eb; outline: none; box-shadow: 0 0 0 2px rgba(37,99,235,0.15); }
  .nav-btn { padding: 0.4rem 0.75rem; border-radius: 0.375rem; font-size: 0.875rem; color: #4b5563; }
  .nav-btn:hover { background: #f3f4f6; }
  .nav-btn.active { background: #1d4ed8; color: white; }
  .nav-btn.active:hover { background: #1e40af; }
  .field-label { font-size: 0.7rem; color: #6b7280; font-weight: 500; }
  .section-h { font-size: 0.7rem; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; }
  details > summary { list-style: none; }
  details > summary::-webkit-details-marker { display: none; }
</style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

<header class="bg-white border-b border-gray-200 sticky top-0 z-10">
  <div class="max-w-5xl mx-auto px-4 py-3 flex items-center gap-3 flex-wrap">
    <h1 class="text-xl font-semibold">🏀 Hoopstats</h1>
    <span class="text-xs text-gray-400">local prototype</span>
    <nav class="flex gap-1 ml-auto flex-wrap" id="nav"></nav>
  </div>
</header>

<main class="max-w-5xl mx-auto px-4 py-6" id="app"></main>

<script>
// ============================================================
// State & persistence
// ============================================================
const STATE_KEY = 'hoopstats_v1';
const SNAPSHOTS_KEY = 'hoopstats_snapshots_v1';
const SNAPSHOT_CAP = 10;
const SCHEMA_VERSION = 1;

function loadState() {
  try {
    const raw = localStorage.getItem(STATE_KEY);
    if (!raw) return { players: [], games: [], seasons: [] };
    const parsed = JSON.parse(raw);
    return {
      players: Array.isArray(parsed.players) ? parsed.players : [],
      games:   Array.isArray(parsed.games)   ? parsed.games   : [],
      seasons: Array.isArray(parsed.seasons) ? parsed.seasons : [],
    };
  } catch (e) {
    console.warn('failed to load state:', e);
    return { players: [], games: [], seasons: [] };
  }
}

function loadSnapshots() {
  try {
    const raw = localStorage.getItem(SNAPSHOTS_KEY);
    if (!raw) return [];
    const arr = JSON.parse(raw);
    return Array.isArray(arr) ? arr : [];
  } catch (e) {
    console.warn('failed to load snapshots:', e);
    return [];
  }
}

function saveSnapshots(list) {
  try {
    localStorage.setItem(SNAPSHOTS_KEY, JSON.stringify(list));
  } catch (e) {
    console.warn('failed to save snapshots:', e);
  }
}

function pushSnapshot(label) {
  const list = loadSnapshots();
  list.unshift({
    id: 'snap_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 6),
    ts: Date.now(),
    label: label || 'auto',
    games: state.games.length,
    players: state.players.length,
    state: JSON.parse(JSON.stringify(state)),
  });
  while (list.length > SNAPSHOT_CAP) list.pop();
  saveSnapshots(list);
}

function seasonName(seasonId) {
  if (!seasonId) return 'No season';
  const s = state.seasons.find(x => x.id === seasonId);
  return s ? s.name : 'Unknown season';
}

function saveState(opts) {
  localStorage.setItem(STATE_KEY, JSON.stringify(state));
  // push a snapshot on every save unless explicitly disabled (e.g. during a restore)
  if (!opts || opts.snapshot !== false) {
    pushSnapshot((opts && opts.label) || 'auto');
  }
}

let state = loadState();
let view = { name: 'players' };
let chart = null;

function uid() {
  return 'id_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);
}

const COLORS = [
  '#1a56db', '#dc2626', '#16a34a', '#ea580c', '#9333ea',
  '#0891b2', '#ca8a04', '#be185d', '#0f766e', '#4338ca',
];

// ============================================================
// Stat shape normalization (handles old + new schemas)
// ============================================================
function statShape(stat, game) {
  const scoring = (game && game.scoring) || '1-2';
  const shortVal = scoring === '1-2' ? 1 : 2;
  const longVal  = scoring === '1-2' ? 2 : 3;
  const isNew =
    stat.shortMade !== undefined || stat.longMade !== undefined ||
    stat.shortAtt  !== undefined || stat.longAtt  !== undefined ||
    stat.offReb    !== undefined || stat.defReb   !== undefined;

  if (isNew) {
    const sm  = +stat.shortMade      || 0;
    const sa  = +stat.shortAtt       || 0;
    const lm  = +stat.longMade       || 0;
    const la  = +stat.longAtt        || 0;
    const csm = +stat.contShortMade  || 0;
    const csa = +stat.contShortAtt   || 0;
    const clm = +stat.contLongMade   || 0;
    const cla = +stat.contLongAtt    || 0;
    const oreb = +stat.offReb || 0;
    const dreb = +stat.defReb || 0;
    // Zone shots (separate breakdown — do NOT roll up into short/long FG%)
    const zcm = +stat.zoneCloseMade || 0;
    const zca = +stat.zoneCloseAtt  || 0;
    const zmm = +stat.zoneMidMade   || 0;
    const zma = +stat.zoneMidAtt    || 0;
    const zlm = +stat.zoneLongMade  || 0;
    const zla = +stat.zoneLongAtt   || 0;
    const czcm = +stat.contZoneCloseMade || 0;
    const czca = +stat.contZoneCloseAtt  || 0;
    const czmm = +stat.contZoneMidMade   || 0;
    const czma = +stat.contZoneMidAtt    || 0;
    const czlm = +stat.contZoneLongMade  || 0;
    const czla = +stat.contZoneLongAtt   || 0;
    return {
      shortMade: sm, shortAtt: sa,
      longMade:  lm, longAtt:  la,
      contShortMade: csm, contShortAtt: csa,
      contLongMade:  clm, contLongAtt:  cla,
      contMade: csm + clm,
      contAtt:  csa + cla,
      offReb: oreb, defReb: dreb,
      reb: oreb + dreb,
      fgm: sm + lm,
      fga: sa + la,
      points: sm * shortVal + lm * longVal,
      ast: +stat.ast || 0,
      stl: +stat.stl || 0,
      blk: +stat.blk || 0,
      to:  +stat.to  || 0,
      // Zones (parallel, do not affect fgm/fga/points)
      zoneCloseMade: zcm, zoneCloseAtt: zca,
      zoneMidMade:   zmm, zoneMidAtt:   zma,
      zoneLongMade:  zlm, zoneLongAtt:  zla,
      contZoneCloseMade: czcm, contZoneCloseAtt: czca,
      contZoneMidMade:   czmm, contZoneMidAtt:   czma,
      contZoneLongMade:  czlm, contZoneLongAtt:  czla,
      shortVal, longVal,
      isNew: true,
    };
  }
  return {
    shortMade: 0, shortAtt: 0, longMade: 0, longAtt: 0,
    contShortMade: 0, contShortAtt: 0, contLongMade: 0, contLongAtt: 0,
    contMade: 0, contAtt: 0,
    offReb: 0, defReb: 0,
    reb: +stat.reb || 0,
    fgm: +stat.fgm || 0,
    fga: +stat.fga || 0,
    points: +stat.points || 0,
    ast: +stat.ast || 0,
    stl: +stat.stl || 0,
    blk: +stat.blk || 0,
    to:  +stat.to  || 0,
    zoneCloseMade: 0, zoneCloseAtt: 0,
    zoneMidMade:   0, zoneMidAtt:   0,
    zoneLongMade:  0, zoneLongAtt:  0,
    contZoneCloseMade: 0, contZoneCloseAtt: 0,
    contZoneMidMade:   0, contZoneMidAtt:   0,
    contZoneLongMade:  0, contZoneLongAtt:  0,
    shortVal, longVal,
    isNew: false,
  };
}

function teamTotals(game, team) {
  const rows = game.stats.filter(s => s.team === team);
  let pts=0, fgm=0, fga=0, reb=0, ast=0, stl=0, blk=0, to=0, contMade=0, contAtt=0, oreb=0, dreb=0;
  for (const r of rows) {
    const s = statShape(r, game);
    pts += s.points; fgm += s.fgm; fga += s.fga; reb += s.reb;
    ast += s.ast;    stl += s.stl; blk += s.blk; to  += s.to;
    contMade += s.contMade; contAtt += s.contAtt;
    oreb += s.offReb; dreb += s.defReb;
  }
  return { pts, fgm, fga, reb, ast, stl, blk, to, contMade, contAtt, oreb, dreb, tracked: getTracked(game) };
}

// What stat groups did this game track?
// Default to all tracked (true) — preserves behavior for any pre-existing saved games.
function getTracked(game) {
  if (!game || !game.tracked) {
    // Legacy games had no `tracked` field — assume the standard groups were tracked, but
    // zones could NOT have been since the feature didn't exist yet.
    return { contested: true, rebounds: true, ast: true, stl: true, blk: true, to: true, zones: false };
  }
  return {
    contested: game.tracked.contested !== false,
    rebounds: game.tracked.rebounds !== false,
    ast: game.tracked.ast !== false,
    stl: game.tracked.stl !== false,
    blk: game.tracked.blk !== false,
    to: game.tracked.to !== false,
    zones: game.tracked.zones === true, // opt-in (strict)
  };
}

// Game category: 'rec' (pickup, 1v1/2v2/3v3...) or 'sanctioned' (refereed 5v5, your team only).
// Legacy games had no `category` field — treat them as recreational.
function getCategory(game) {
  return (game && game.category === 'sanctioned') ? 'sanctioned' : 'rec';
}
// Who won? Uses an explicit winner override when set, otherwise derives from score.
// Returns 'A', 'B', or 'Tie'.
function getWinner(game) {
  if (game.winner === 'A' || game.winner === 'B' || game.winner === 'Tie') return game.winner;
  if (game.scoreA === game.scoreB) return 'Tie';
  return game.scoreA > game.scoreB ? 'A' : 'B';
}
// Parse the per-side player count from a format like "3v3" → 3 (null if unknown).
function perSideCount(format) {
  const m = /^(\d+)v(\d+)$/.exec(format || '');
  return m ? parseInt(m[1], 10) : null;
}

const NA_HTML = '<span class="text-gray-400 italic">N/A</span>';
function naOr(isTracked, formatted) {
  return isTracked ? formatted : NA_HTML;
}

// ============================================================
// Navigation
// ============================================================
function go(next) {
  view = next;
  if (chart) { chart.destroy(); chart = null; }
  render();
  window.scrollTo(0, 0);
}

function renderNav() {
  const nav = document.getElementById('nav');
  const tabs = [
    { id: 'players', label: 'Players' },
    { id: 'log',     label: 'Log game' },
    { id: 'games',   label: 'Games' },
    { id: 'import',  label: 'Import' },
    { id: 'backup',  label: 'Backup' },
  ];
  nav.innerHTML = tabs.map(t =>
    `<button type="button" class="nav-btn ${view.name === t.id ? 'active' : ''}" data-go="${t.id}">${t.label}</button>`
  ).join('');
  nav.querySelectorAll('button[data-go]').forEach(btn => {
    btn.addEventListener('click', () => go({ name: btn.dataset.go }));
  });
}

function render() {
  renderNav();
  const app = document.getElementById('app');
  if      (view.name === 'players') app.innerHTML = renderPlayers();
  else if (view.name === 'log')     app.innerHTML = renderLogGame();
  else if (view.name === 'games')   app.innerHTML = renderGames();
  else if (view.name === 'player')  app.innerHTML = renderPlayerDetail(view.playerId);
  else if (view.name === 'import')  app.innerHTML = renderImport();
  else if (view.name === 'backup')  app.innerHTML = renderBackup();
  else app.innerHTML = '<p>Unknown view.</p>';

  if      (view.name === 'players') wirePlayers();
  else if (view.name === 'log')     wireLogGame();
  else if (view.name === 'games')   wireGames();
  else if (view.name === 'player')  wirePlayerDetail(view.playerId);
  else if (view.name === 'import')  wireImport();
  else if (view.name === 'backup')  wireBackup();
}

// ============================================================
// VIEW: Players
// ============================================================
function renderPlayers() {
  const playerCards = state.players.length === 0
    ? `<div class="border border-dashed border-gray-300 rounded-lg p-8 text-center text-sm text-gray-600">
         No players yet. Add one above to start logging games.
       </div>`
    : `<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
         ${state.players.map(p => {
           const games = playerGames(p.id);
           return `
           <div class="bg-white border border-gray-200 rounded-lg p-4 flex items-center gap-3">
             <span class="w-10 h-10 rounded-full inline-flex items-center justify-center font-semibold text-sm shrink-0"
                   style="background:${p.color}20; color:${p.color};">
               ${escapeHtml(p.abbr || p.name.slice(0,2).toUpperCase())}
             </span>
             <div class="flex-1 min-w-0">
               <div class="font-medium truncate">${escapeHtml(p.name)}</div>
               <div class="text-xs text-gray-500">${games.length} game${games.length===1?'':'s'}</div>
             </div>
             <button type="button" class="text-xs text-blue-700 hover:underline" data-view-player="${p.id}">Stats →</button>
             <button type="button" class="text-xs text-gray-400 hover:text-red-600" data-delete-player="${p.id}" title="Delete player">×</button>
           </div>`;
         }).join('')}
       </div>`;

  return `
    <div class="space-y-6">
      <section class="bg-white border border-gray-200 rounded-lg p-4">
        <h2 class="text-sm font-semibold mb-3">Add player</h2>
        <form id="add-player-form" class="grid grid-cols-1 sm:grid-cols-12 gap-2 items-end">
          <label class="text-xs text-gray-600 sm:col-span-5">
            Name
            <input name="name" required class="mt-1 w-full border border-gray-300 rounded px-2 py-1.5 text-sm" placeholder="e.g. RJ">
          </label>
          <label class="text-xs text-gray-600 sm:col-span-2">
            Initials
            <input name="abbr" maxlength="3" class="mt-1 w-full border border-gray-300 rounded px-2 py-1.5 text-sm" placeholder="RJ">
          </label>
          <label class="text-xs text-gray-600 sm:col-span-3">
            Color
            <input name="color" type="color" value="${COLORS[state.players.length % COLORS.length]}" class="mt-1 w-full h-9 border border-gray-300 rounded">
          </label>
          <button type="submit" class="sm:col-span-2 bg-blue-700 text-white rounded px-3 py-2 text-sm font-medium hover:bg-blue-800">Add</button>
        </form>
      </section>

      <section>
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-sm font-semibold">Roster</h2>
          <span class="text-xs text-gray-500">${state.players.length} player${state.players.length===1?'':'s'}</span>
        </div>
        ${playerCards}
      </section>

      <section class="bg-white border border-gray-200 rounded-lg p-4">
        <h2 class="text-sm font-semibold mb-2">Seasons</h2>
        <p class="text-xs text-gray-500 mb-3">Tag games by season so you can compare stretches of time. Existing games stay untagged unless you edit them.</p>
        <form id="add-season-form" class="grid grid-cols-1 sm:grid-cols-12 gap-2 items-end mb-3">
          <label class="text-xs text-gray-600 sm:col-span-10">
            New season name
            <input name="name" required class="mt-1 w-full border border-gray-300 rounded px-2 py-1.5 text-sm" placeholder="e.g. Summer 2026">
          </label>
          <button type="submit" class="sm:col-span-2 bg-blue-700 text-white rounded px-3 py-2 text-sm font-medium hover:bg-blue-800">Add</button>
        </form>
        ${state.seasons.length === 0
          ? `<div class="text-xs text-gray-500 italic">No seasons yet.</div>`
          : `<ul class="divide-y divide-gray-100 border border-gray-200 rounded">
              ${state.seasons.map(s => {
                const count = state.games.filter(g => g.seasonId === s.id).length;
                return `
                  <li class="flex items-center gap-3 px-3 py-2 text-sm">
                    <span class="flex-1 font-medium truncate">${escapeHtml(s.name)}</span>
                    <span class="text-xs text-gray-500">${count} game${count===1?'':'s'}</span>
                    <button type="button" class="text-xs text-gray-400 hover:text-red-600" data-delete-season="${s.id}" title="Delete season">×</button>
                  </li>`;
              }).join('')}
            </ul>`}
      </section>

      <section class="bg-white border border-gray-200 rounded-lg p-4">
        <h2 class="text-sm font-semibold mb-2">Backup &amp; restore</h2>
        <p class="text-xs text-gray-500 mb-3">
          All your data lives in your browser's local storage on this device only. Export a JSON file as a backup or to move data to another browser/computer.
        </p>
        <div class="flex flex-wrap gap-2">
          <button type="button" id="export-btn" class="text-sm border border-gray-300 rounded px-3 py-1.5 hover:bg-gray-50">⬇ Export JSON</button>
          <button type="button" id="import-btn" class="text-sm border border-gray-300 rounded px-3 py-1.5 hover:bg-gray-50">⬆ Import JSON</button>
          <input type="file" id="import-file" accept="application/json" class="hidden">
          <button type="button" id="reset-btn" class="text-sm border border-red-200 text-red-700 rounded px-3 py-1.5 hover:bg-red-50 ml-auto">Erase all data</button>
        </div>
      </section>
    </div>
  `;
}

function wirePlayers() {
  const form = document.getElementById('add-player-form');
  if (form) {
    form.addEventListener('submit', e => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const name = String(fd.get('name') || '').trim();
      if (!name) return;
      const abbr = String(fd.get('abbr') || '').trim().toUpperCase().slice(0, 3) || name.slice(0, 2).toUpperCase();
      const color = String(fd.get('color') || COLORS[0]);
      state.players.push({ id: uid(), name, abbr, color, createdAt: new Date().toISOString() });
      saveState();
      render();
    });
  }

  document.querySelectorAll('button[data-view-player]').forEach(btn => {
    btn.addEventListener('click', () => go({ name: 'player', playerId: btn.dataset.viewPlayer }));
  });

  const seasonForm = document.getElementById('add-season-form');
  if (seasonForm) {
    seasonForm.addEventListener('submit', e => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const name = String(fd.get('name') || '').trim();
      if (!name) return;
      state.seasons.push({ id: uid(), name, createdAt: new Date().toISOString() });
      saveState();
      render();
    });
  }

  document.querySelectorAll('button[data-delete-season]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.deleteSeason;
      const s = state.seasons.find(x => x.id === id);
      const used = state.games.some(g => g.seasonId === id);
      const msg = used
        ? `Delete season "${s?.name}"? ${state.games.filter(g => g.seasonId === id).length} game(s) will become untagged (no season). Games are NOT deleted.`
        : `Delete season "${s?.name}"?`;
      if (!confirm(msg)) return;
      state.seasons = state.seasons.filter(x => x.id !== id);
      state.games = state.games.map(g => g.seasonId === id ? { ...g, seasonId: null } : g);
      saveState();
      render();
    });
  });

  document.querySelectorAll('button[data-delete-player]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.deletePlayer;
      const p = state.players.find(x => x.id === id);
      const used = state.games.some(g => g.stats.some(s => s.playerId === id));
      const msg = used
        ? `Delete ${p?.name}? They appear in past games — those rows will be removed too.`
        : `Delete ${p?.name}?`;
      if (!confirm(msg)) return;
      state.players = state.players.filter(x => x.id !== id);
      state.games = state.games.map(g => ({ ...g, stats: g.stats.filter(s => s.playerId !== id) }));
      saveState();
      render();
    });
  });

  const exportBtn = document.getElementById('export-btn');
  if (exportBtn) exportBtn.addEventListener('click', () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `hoopstats-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  });

  const fileInput = document.getElementById('import-file');
  const importBtn = document.getElementById('import-btn');
  if (importBtn && fileInput) {
    importBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', async () => {
      const file = fileInput.files?.[0];
      if (!file) return;
      try {
        const text = await file.text();
        const parsed = JSON.parse(text);
        if (!parsed || !Array.isArray(parsed.players) || !Array.isArray(parsed.games)) {
          alert("That file doesn't look like a Hoopstats export.");
          return;
        }
        const seasons = Array.isArray(parsed.seasons) ? parsed.seasons : [];
        if (!confirm(`Replace your current data with ${parsed.players.length} players, ${parsed.games.length} games, ${seasons.length} season${seasons.length===1?'':'s'}?`)) return;
        state = { players: parsed.players, games: parsed.games, seasons };
        saveState();
        render();
      } catch (e) {
        alert('Could not read that file: ' + e.message);
      }
    });
  }

  const resetBtn = document.getElementById('reset-btn');
  if (resetBtn) resetBtn.addEventListener('click', () => {
    if (!confirm('Erase ALL players, games, and seasons? This cannot be undone (unless you have an export).')) return;
    state = { players: [], games: [], seasons: [] };
    saveState();
    render();
  });
}

// ============================================================
// VIEW: Log game
// ============================================================
let logForm = null;

function newDraft() {
  const now = new Date();
  now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
  // Default seasonId to most recently created season, if any.
  const defaultSeasonId = state.seasons.length > 0
    ? [...state.seasons].sort((a, b) => +new Date(b.createdAt || 0) - +new Date(a.createdAt || 0))[0].id
    : null;
  return {
    playedAt: now.toISOString().slice(0, 10),
    gameOrder: '',
    durationMinutes: '',
    winner: '',
    trackQuarters: false,
    activeQuarter: 1,
    category: 'rec',
    format: '2v2',
    scoring: '1-2',
    ruleScore: 21,
    scoreA: '',
    scoreB: '',
    notes: '',
    seasonId: defaultSeasonId,
    tracked: { contested: true, rebounds: true, ast: true, stl: true, blk: true, to: true, zones: false },
    rows: [emptyStatRow('A'), emptyStatRow('B')],
  };
}

// Reconstruct a logForm draft from a previously saved game (for editing).
function gameToLogForm(game) {
  // Convert stored ISO timestamp → local YYYY-MM-DD for the date input.
  const d = new Date(game.playedAt);
  const playedAt = [
    d.getFullYear(),
    String(d.getMonth() + 1).padStart(2, '0'),
    String(d.getDate()).padStart(2, '0'),
  ].join('-');

  const tr = getTracked(game);

  const rows = game.stats.map(stat => {
    const row = emptyStatRow(stat.team);
    row.playerId = stat.playerId;
    // Copy all known stat fields (QUARTER_STAT_KEYS covers every shooting/reb/other field).
    for (const k of QUARTER_STAT_KEYS) {
      if (stat[k] !== undefined) row[k] = stat[k];
    }
    // Restore quarter breakdowns if the game was logged with quarter tracking.
    if (stat.quarterStats && Array.isArray(stat.quarterStats) && stat.quarterStats.length === 4) {
      row.quarters = stat.quarterStats.map(q => ({ ...emptyQuarterStats(), ...q }));
    }
    return row;
  });

  return {
    editingGameId: game.id,
    playedAt,
    gameOrder: game.order != null ? String(game.order) : '',
    durationMinutes: game.durationMinutes != null ? String(game.durationMinutes) : '',
    winner: game.winner || '',
    trackQuarters: !!game.trackQuarters,
    activeQuarter: 1,
    category: game.category === 'sanctioned' ? 'sanctioned' : 'rec',
    format: game.format || '2v2',
    scoring: game.scoring || '1-2',
    ruleScore: game.ruleScore != null ? game.ruleScore : 21,
    scoreA: game.scoreA != null ? game.scoreA : '',
    scoreB: game.scoreB != null ? game.scoreB : '',
    notes: game.notes || '',
    seasonId: game.seasonId || null,
    tracked: {
      contested: !!tr.contested, rebounds: !!tr.rebounds,
      ast: !!tr.ast, stl: !!tr.stl, blk: !!tr.blk, to: !!tr.to, zones: !!tr.zones,
    },
    rows,
  };
}

const TRACK_GROUPS = [
  { key: 'contested', label: 'Contested shots' },
  { key: 'rebounds',  label: 'Rebounds' },
  { key: 'ast',       label: 'Assists' },
  { key: 'stl',       label: 'Steals' },
  { key: 'blk',       label: 'Blocks' },
  { key: 'to',        label: 'Turnovers' },
  { key: 'zones',     label: 'Shot zones (close/mid/long)' },
];

function emptyQuarterStats() {
  return {
    shortMade: 0, shortAtt: 0,
    longMade: 0,  longAtt: 0,
    contShortMade: 0, contShortAtt: 0,
    contLongMade: 0,  contLongAtt: 0,
    offReb: 0, defReb: 0,
    ast: 0, stl: 0, blk: 0, to: 0,
    zoneCloseMade: 0, zoneCloseAtt: 0,
    zoneMidMade: 0,   zoneMidAtt: 0,
    zoneLongMade: 0,  zoneLongAtt: 0,
    contZoneCloseMade: 0, contZoneCloseAtt: 0,
    contZoneMidMade: 0,   contZoneMidAtt: 0,
    contZoneLongMade: 0,  contZoneLongAtt: 0,
  };
}

const QUARTER_STAT_KEYS = [
  'shortMade','shortAtt','longMade','longAtt',
  'contShortMade','contShortAtt','contLongMade','contLongAtt',
  'offReb','defReb','ast','stl','blk','to',
  'zoneCloseMade','zoneCloseAtt','zoneMidMade','zoneMidAtt','zoneLongMade','zoneLongAtt',
  'contZoneCloseMade','contZoneCloseAtt','contZoneMidMade','contZoneMidAtt','contZoneLongMade','contZoneLongAtt',
];

function recomputeRowTotals(i) {
  const row = logForm.rows[i];
  if (!row || !row.quarters) return;
  for (const k of QUARTER_STAT_KEYS) {
    row[k] = row.quarters.reduce((sum, q) => sum + n(q[k]), 0);
  }
}

function getDisplaySrc(row) {
  if (logForm && logForm.trackQuarters && logForm.category === 'sanctioned' &&
      logForm.activeQuarter > 0 && row.quarters) {
    return row.quarters[logForm.activeQuarter - 1];
  }
  return row;
}

function emptyStatRow(team) {
  return {
    rid: uid(),
    playerId: '',
    team,
    shortMade: '', shortAtt: '',
    longMade: '',  longAtt: '',
    contShortMade: '', contShortAtt: '',
    contLongMade:  '', contLongAtt:  '',
    offReb: '', defReb: '',
    ast: '', stl: '', blk: '', to: '',
    // Shot zones (parallel breakdown — does not affect short/long FG%)
    zoneCloseMade: '', zoneCloseAtt: '',
    zoneMidMade:   '', zoneMidAtt:   '',
    zoneLongMade:  '', zoneLongAtt:  '',
    contZoneCloseMade: '', contZoneCloseAtt: '',
    contZoneMidMade:   '', contZoneMidAtt:   '',
    contZoneLongMade:  '', contZoneLongAtt:  '',
    quarters: [emptyQuarterStats(), emptyQuarterStats(), emptyQuarterStats(), emptyQuarterStats()],
  };
}

// Coerce stat-input values (which may be '' while typing) to a finite number.
function n(x) {
  const v = +x;
  return Number.isFinite(v) ? v : 0;
}

function pointValues(scoring) {
  return scoring === '2-3' ? { short: 2, long: 3 } : { short: 1, long: 2 };
}

function rowDerived(row, scoring) {
  const v = pointValues(scoring);
  const fgm = n(row.shortMade) + n(row.longMade);
  const fga = n(row.shortAtt) + n(row.longAtt);
  const points = n(row.shortMade) * v.short + n(row.longMade) * v.long;
  const reb = n(row.offReb) + n(row.defReb);
  return { fgm, fga, points, reb };
}

function computeDraftTotals(draft, team) {
  const v = pointValues(draft.scoring);
  let pts=0, fgm=0, fga=0, reb=0;
  for (const r of draft.rows) {
    if (r.team !== team || !r.playerId) continue;
    pts += n(r.shortMade) * v.short + n(r.longMade) * v.long;
    fgm += n(r.shortMade) + n(r.longMade);
    fga += n(r.shortAtt)  + n(r.longAtt);
    reb += n(r.offReb) + n(r.defReb);
  }
  return { pts, fgm, fga, reb };
}

      </section>
      ` : ''}

      <div class="rounded-lg border ${sanctioned ? 'border-indigo-200 bg-indigo-50 text-indigo-800' : 'border-gray-200 bg-gray-50 text-gray-600'} px-3 py-2 text-xs">
        ${sanctioned
          ? `<span class="font-medium">Official match — recording your team only.</span> Add a row for each teammate whose individual stats you want to track (even just yourself).${perSide ? ` Roster hint: ~${perSide} players per side.` : ''}`
          : `<span class="font-medium">Recreational game.</span>${perSide ? ` ~${perSide} players per team (soft hint — log as many as you like).` : ''}`}
      </div>

      ${teamSection('A')}
      ${sanctioned ? '' : teamSection('B')}

      <div id="log-error" class="hidden rounded-lg border border-red-200 bg-red-50 p-3 text-sm text-red-700"></div>

      <div class="flex items-center gap-3 flex-wrap">
        <button type="submit" class="bg-blue-700 text-white rounded-lg px-5 py-2 text-sm font-medium hover:bg-blue-800">${logForm.editingGameId ? 'Update game' : 'Save game'}</button>
        <button type="button" id="log-cancel" class="text-sm text-gray-600 hover:underline">${logForm.editingGameId ? 'Discard changes' : 'Cancel'}</button>
        <span class="text-xs text-gray-400 ml-auto">Points auto-compute from your makes. Contested attempts/makes should be a subset of the totals for that shot type.</span>
      </div>
    </form>
  `;
}

function wireLogGame() {
  document.querySelectorAll('button[data-go]').forEach(btn => {
    btn.addEventListener('click', () => go({ name: btn.dataset.go }));
  });

  const form = document.getElementById('log-form');
  if (!form) return;

  form.querySelectorAll('[data-meta]').forEach(el => {
    const evt = el.tagName === 'SELECT' ? 'change' : 'input';
    el.addEventListener(evt, () => {
      const k = el.dataset.meta;
      let v = el.value;
      if (['ruleScore','scoreA','scoreB'].includes(k)) {
        v = v === '' ? '' : (parseInt(v, 10) || 0);
      }
      if (k === 'seasonId') v = v || null;
      logForm[k] = v;
      if (k === 'playedAt') {
        // Recompute suggested game order whenever the date changes.
        logForm.gameOrder = '';
        const gamesOnDate = state.games.filter(g =>
          g.playedAt.slice(0, 10) === v &&
          g.id !== (logForm.editingGameId || null)
        ).length;
        const suggested = gamesOnDate + 1;
        logForm.gameOrder = String(suggested);
        const orderEl = form.querySelector('[data-meta="gameOrder"]');
        if (orderEl) orderEl.value = suggested;
      }
      if (k === 'category') {
        if (v === 'sanctioned') {
          // Sanctioned = your team only. Drop any opponent (Team B) rows from the draft,
          // and nudge format/scoring toward a refereed 5v5 game.
          logForm.rows = logForm.rows.filter(r => r.team === 'A');
          if (logForm.rows.length === 0) logForm.rows.push(emptyStatRow('A'));
          logForm.format = '5v5';
          logForm.scoring = '2-3';
        } else {
          // Back to recreational — make sure there's an opponent team to log.
          if (!logForm.rows.some(r => r.team === 'B')) logForm.rows.push(emptyStatRow('B'));
        }
        render();
        return;
      }
      if (k === 'scoring' || k === 'format') {
        // Labels (1PT/2PT vs 2PT/3PT), points, and the roster hint all change → full re-render.
        render();
        return;
      }
      if (k === 'scoreA') {
        const lbl = document.querySelector('[data-team-final-A]');
        if (lbl) lbl.textContent = `(final ${v === '' ? '—' : v} pts)`;
      }
      if (k === 'scoreB') {
        const lbl = document.querySelector('[data-team-final-B]');
        if (lbl) lbl.textContent = `(final ${v === '' ? '—' : v} pts)`;
      }
    });
  });

  form.querySelectorAll('[data-track]').forEach(el => {
    el.addEventListener('change', () => {
      const k = el.dataset.track;
      logForm.tracked[k] = el.checked;
      // Toggling a group changes which inputs are visible → re-render.
      render();
    });
  });

  form.querySelectorAll('[data-row-i]').forEach(card => {
    const i = parseInt(card.dataset.rowI);
    card.querySelectorAll('[data-field]').forEach(input => {
      input.addEventListener('input', () => {
        const k = input.dataset.field;
        if (k === 'playerId') {
          logForm.rows[i].playerId = input.value;
          render();
        } else {
          // Keep empty as '' so the input stays blank for fast typing; coerce on read via n().
          const raw = input.value;
          logForm.rows[i][k] = raw === '' ? '' : (parseInt(raw, 10) || 0);
          updateRowSummary(i);
          updateTeamTotals(logForm.rows[i].team);
        }
      });
    });
    const rm = card.querySelector('button[data-remove-row]');
    if (rm) rm.addEventListener('click', () => {
      logForm.rows.splice(i, 1);
      render();
    });
  });

  form.querySelectorAll('button[data-add-row]').forEach(btn => {
    btn.addEventListener('click', () => {
      logForm.rows.push(emptyStatRow(btn.dataset.addRow));
      render();
    });
  });

  document.getElementById('log-cancel').addEventListener('click', () => {
    const msg = logForm.editingGameId ? 'Discard changes to this game?' : 'Discard this entry?';
    if (!confirm(msg)) return;
    logForm = null;
    go({ name: 'games' });
  });

  form.addEventListener('submit', e => {
    e.preventDefault();
    const errorEl = document.getElementById('log-error');
    const sanctioned = (logForm.category === 'sanctioned');
    const filled = logForm.rows.filter(r => r.playerId);
    const minPlayers = sanctioned ? 1 : 2;
    if (filled.length < minPlayers) {
      errorEl.textContent = sanctioned
        ? 'Pick at least one player to track.'
        : 'Pick at least two players.';
      errorEl.classList.remove('hidden');
      return;
    }
    const ids = new Set(filled.map(r => r.playerId));
    if (ids.size !== filled.length) {
      errorEl.textContent = 'Each player can only appear once.';
      errorEl.classList.remove('hidden');
      return;
    }
    const tr = logForm.tracked;
    if (tr.contested) {
      for (const r of filled) {
        if (n(r.contShortMade) > n(r.shortMade) || n(r.contShortAtt) > n(r.shortAtt) ||
            n(r.contLongMade)  > n(r.longMade)  || n(r.contLongAtt)  > n(r.longAtt)) {
          errorEl.textContent = "Contested makes/attempts can't exceed the totals for that shot type.";
          errorEl.classList.remove('hidden');
          return;
        }
      }
    }
    if (tr.zones) {
      for (const r of filled) {
        if (n(r.contZoneCloseMade) > n(r.zoneCloseMade) || n(r.contZoneCloseAtt) > n(r.zoneCloseAtt) ||
            n(r.contZoneMidMade)   > n(r.zoneMidMade)   || n(r.contZoneMidAtt)   > n(r.zoneMidAtt)   ||
            n(r.contZoneLongMade)  > n(r.zoneLongMade)  || n(r.contZoneLongAtt)  > n(r.zoneLongAtt)) {
          errorEl.textContent = "Contested zone makes/attempts can't exceed that zone's totals.";
          errorEl.classList.remove('hidden');
          return;
        }
        if (n(r.zoneCloseMade) > n(r.zoneCloseAtt) ||
            n(r.zoneMidMade)   > n(r.zoneMidAtt)   ||
            n(r.zoneLongMade)  > n(r.zoneLongAtt)) {
          errorEl.textContent = "Zone makes can't exceed zone attempts.";
          errorEl.classList.remove('hidden');
          return;
        }
      }
    }

    const game = {
      id: logForm.editingGameId || uid(),
      playedAt: new Date(logForm.playedAt + 'T12:00:00').toISOString(),
      order: logForm.gameOrder !== '' ? n(logForm.gameOrder) : 1,
      durationMinutes: logForm.durationMinutes !== '' ? n(logForm.durationMinutes) : null,
      winner: logForm.winner || null,
      trackQuarters: !!(logForm.trackQuarters && logForm.category === 'sanctioned'),
      category: logForm.category === 'sanctioned' ? 'sanctioned' : 'rec',
      format: logForm.format,
      scoring: logForm.scoring,
      ruleScore: n(logForm.ruleScore),
      scoreA: n(logForm.scoreA),
      scoreB: n(logForm.scoreB),
      notes: logForm.notes,
      seasonId: logForm.seasonId || null,
      tracked: { ...tr },
      stats: filled.map(r => ({
        playerId: r.playerId,
        team: r.team,
        shortMade: n(r.shortMade), shortAtt: n(r.shortAtt),
        longMade:  n(r.longMade),  longAtt:  n(r.longAtt),
        // Zero out fields whose group wasn't tracked, so totals don't pick up stale typing.
        contShortMade: tr.contested ? n(r.contShortMade) : 0,
        contShortAtt:  tr.contested ? n(r.contShortAtt)  : 0,
        contLongMade:  tr.contested ? n(r.contLongMade)  : 0,
        contLongAtt:   tr.contested ? n(r.contLongAtt)   : 0,
        offReb: tr.rebounds ? n(r.offReb) : 0,
        defReb: tr.rebounds ? n(r.defReb) : 0,
        ast: tr.ast ? n(r.ast) : 0,
        stl: tr.stl ? n(r.stl) : 0,
        blk: tr.blk ? n(r.blk) : 0,
        to:  tr.to  ? n(r.to)  : 0,
        // Zone shots (parallel — only populated when zones tracked)
        zoneCloseMade: tr.zones ? n(r.zoneCloseMade) : 0,
        zoneCloseAtt:  tr.zones ? n(r.zoneCloseAtt)  : 0,
        zoneMidMade:   tr.zones ? n(r.zoneMidMade)   : 0,
        zoneMidAtt:    tr.zones ? n(r.zoneMidAtt)    : 0,
        zoneLongMade:  tr.zones ? n(r.zoneLongMade)  : 0,
        zoneLongAtt:   tr.zones ? n(r.zoneLongAtt)   : 0,
        contZoneCloseMade: tr.zones ? n(r.contZoneCloseMade) : 0,
        contZoneCloseAtt:  tr.zones ? n(r.contZoneCloseAtt)  : 0,
        contZoneMidMade:   tr.zones ? n(r.contZoneMidMade)   : 0,
        contZoneMidAtt:    tr.zones ? n(r.contZoneMidAtt)    : 0,
        contZoneLongMade:  tr.zones ? n(r.contZoneLongMade)  : 0,
        contZoneLongAtt:   tr.zones ? n(r.contZoneLongAtt)   : 0,
        quarterStats: (logForm.trackQuarters && logForm.category === 'sanctioned' && r.quarters)
          ? r.quarters
          : undefined,
      })),
    };
    if (logForm.editingGameId) {
      // Replace the existing game in-place (keeps its position in the list).
      const idx = state.games.findIndex(g => g.id === logForm.editingGameId);
      if (idx !== -1) state.games[idx] = game;
      else state.games.push(game); // safety fallback
    } else {
      state.games.push(game);
    }
    saveState();
    logForm = null;
    go({ name: 'games' });
  });
}

function updateRowSummary(i) {
  const card = document.querySelector(`[data-row-i="${i}"]`);
  if (!card) return;
  const r = logForm.rows[i];
  const d = rowDerived(r, logForm.scoring);
  const fgPct = d.fga ? (d.fgm / d.fga * 100).toFixed(1) + '%' : '–';
  const ptsEl = card.querySelector('[data-pts]');
  const fgEl  = card.querySelector('[data-fg]');
  const pctEl = card.querySelector('[data-fgpct]');
  const rebEl = card.querySelector('[data-reb]');
  if (ptsEl) ptsEl.textContent = d.points;
  if (fgEl)  fgEl.textContent  = `${d.fgm}/${d.fga}`;
  if (pctEl) pctEl.textContent = fgPct;
  if (rebEl) rebEl.textContent = d.reb;
}

function updateTeamTotals(team) {
  const t = computeDraftTotals(logForm, team);
  const ptsEl = document.querySelector(`[data-team-pts="${team}"]`);
  const fgEl  = document.querySelector(`[data-team-fg="${team}"]`);
  const rebEl = document.querySelector(`[data-team-reb="${team}"]`);
  if (ptsEl) ptsEl.textContent = t.pts;
  if (fgEl)  fgEl.textContent  = `${t.fgm}/${t.fga}`;
  if (rebEl) rebEl.textContent = t.reb;
}

// ============================================================
// VIEW: Games (history)
// ============================================================
function renderGames() {
  if (state.games.length === 0) {
    return `
      <div class="border border-dashed border-gray-300 rounded-lg p-8 text-center text-sm text-gray-600 space-y-3">
        <div>No games logged yet.</div>
        <button type="button" class="bg-blue-700 text-white rounded px-3 py-1.5 text-sm hover:bg-blue-800" data-go="log">Log your first game</button>
      </div>
    `;
  }

  const filter = view.seasonFilter || '__all__';
  const sortedAll = [...state.games].sort((a, b) => {
    const dd = +new Date(b.playedAt) - +new Date(a.playedAt);
    return dd !== 0 ? dd : (b.order || 1) - (a.order || 1);
  });
  const sorted = sortedAll.filter(g => {
    if (filter === '__all__') return true;
    if (filter === '__none__') return !g.seasonId;
    return g.seasonId === filter;
  });

  const filterBar = `
    <div class="flex items-center gap-2 flex-wrap">
      <label class="text-xs text-gray-600 flex items-center gap-2">
        Season:
        <select id="games-season-filter" class="border border-gray-300 rounded px-2 py-1 text-sm">
          <option value="__all__"  ${filter==='__all__'?'selected':''}>All seasons</option>
          <option value="__none__" ${filter==='__none__'?'selected':''}>No season</option>
          ${state.seasons.map(s => `<option value="${s.id}" ${filter===s.id?'selected':''}>${escapeHtml(s.name)}</option>`).join('')}
        </select>
      </label>
      <span class="text-xs text-gray-500 ml-auto">${sorted.length} of ${sortedAll.length} game${sortedAll.length===1?'':'s'}</span>
    </div>
  `;

  if (sorted.length === 0) {
    return `
      <div class="space-y-3">
        ${filterBar}
        <div class="border border-dashed border-gray-300 rounded-lg p-8 text-center text-sm text-gray-600">
          No games match this filter.
        </div>
      </div>
    `;
  }

  // Pre-compute which dates have multiple games so we can show "#N" badges.
  const dateCounts = new Map();
  for (const g of sorted) {
    const dk = g.playedAt.slice(0, 10);
    dateCounts.set(dk, (dateCounts.get(dk) || 0) + 1);
  }

  return `
    <div class="space-y-3">
      ${filterBar}
      ${sorted.map(g => {
        const winner = getWinner(g);
        const dk = g.playedAt.slice(0, 10);
        const multiDay = (dateCounts.get(dk) || 1) > 1;
        const teamA = g.stats.filter(s => s.team === 'A').map(s => byId(s.playerId)).filter(Boolean);
        const teamB = g.stats.filter(s => s.team === 'B').map(s => byId(s.playerId)).filter(Boolean);
        const totA = teamTotals(g, 'A');
        const totB = teamTotals(g, 'B');
        const scoringLabel = (g.scoring === '2-3') ? '2/3' : (g.scoring === '1-2' ? '1/2' : '');
        const sName = g.seasonId ? seasonName(g.seasonId) : '';
        const sanctioned = getCategory(g) === 'sanctioned';
        const catBadge = sanctioned
          ? '<span class="inline-block text-[9px] uppercase tracking-wide bg-indigo-100 text-indigo-700 rounded px-1 py-0.5 mr-1">Official</span>'
          : '<span class="inline-block text-[9px] uppercase tracking-wide bg-gray-100 text-gray-600 rounded px-1 py-0.5 mr-1">Rec</span>';
        return `
          <details class="bg-white border border-gray-200 rounded-lg group">
            <summary class="flex items-center gap-3 px-4 py-3 cursor-pointer">
              <div class="text-xs text-gray-500 w-32 shrink-0">
                ${new Date(g.playedAt).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'})}
                ${multiDay ? `<span class="ml-1 text-[10px] font-medium text-indigo-600 bg-indigo-50 border border-indigo-200 rounded px-1">G${g.order || 1}</span>` : ''}
                <div class="text-[10px] text-gray-400 mt-0.5">${catBadge}${g.format}${scoringLabel ? ' · '+scoringLabel : ''}${sName ? ' · '+escapeHtml(sName) : ''}</div>
              </div>
              <div class="flex-1 flex items-center gap-2 flex-wrap">
                <div class="flex items-center gap-1">
                  ${teamA.map(p => playerChip(p)).join('')}
                </div>
                <div class="font-semibold text-sm tabular-nums flex items-center gap-1">
                  <span class="${winner==='A'?'text-green-700':''}">${g.scoreA}</span>
                  <span class="text-gray-400">–</span>
                  <span class="${winner==='B'?'text-green-700':''}">${g.scoreB}</span>
                  ${g.winner ? `<span class="text-[9px] font-normal text-amber-600 border border-amber-300 rounded px-1 ml-0.5">override</span>` : ''}
                </div>
                <div class="flex items-center gap-1">
                  ${sanctioned ? '<span class="text-xs text-gray-400 italic">Opponent</span>' : teamB.map(p => playerChip(p)).join('')}
                </div>
              </div>
              <span class="text-gray-400 text-xs">▾</span>
            </summary>
            <div class="border-t border-gray-100 px-4 py-3 space-y-3">
              ${g.notes ? `<div class="text-xs text-gray-600 italic">"${escapeHtml(g.notes)}"</div>` : ''}

              <div class="grid grid-cols-1 md:grid-cols-2 gap-2 text-xs">
                ${teamSummaryCard('A', totA, g.scoreA, winner==='A', sanctioned ? 'Your team' : null)}
                ${sanctioned
                  ? `<div class="border ${winner==='B' ? 'border-green-200 bg-green-50/60' : 'border-gray-200 bg-gray-50'} rounded-lg p-3 flex items-center justify-between">
                       <span class="font-medium">Opponent</span>
                       <span class="tabular-nums font-semibold">${g.scoreB} pts</span>
                     </div>`
                  : teamSummaryCard('B', totB, g.scoreB, winner==='B')}
              </div>

              <div class="overflow-x-auto">
                <table class="w-full text-sm">
                  <thead class="text-xs text-gray-500">
                    <tr>
                      <th class="text-left py-1 font-medium">Player</th>
                      <th class="py-1 font-medium">Tm</th>
                      <th class="py-1 font-medium">PTS</th>
                      <th class="py-1 font-medium">FG</th>
                      <th class="py-1 font-medium" title="Contested makes/attempts">Cont</th>
                      <th class="py-1 font-medium" title="Off / Def / Total">REB</th>
                      <th class="py-1 font-medium">AST</th>
                      <th class="py-1 font-medium">STL</th>
                      <th class="py-1 font-medium">BLK</th>
                      <th class="py-1 font-medium">TO</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${g.stats.map(stat => {
                      const p = byId(stat.playerId);
                      if (!p) return '';
                      const s = statShape(stat, g);
                      const tr = getTracked(g);
                      const rebCell  = !tr.rebounds  ? NA_HTML : (s.isNew ? `${s.offReb}/${s.defReb}/${s.reb}` : `${s.reb}`);
                      const contCell = !tr.contested ? NA_HTML : (s.isNew ? `${s.contMade}/${s.contAtt}` : '—');
                      const zoneRow = tr.zones ? `
                        <tr>
                          <td colspan="10" class="py-1 px-2 text-[11px] text-gray-500 italic bg-gray-50">
                            Zones — Close ${s.zoneCloseMade}/${s.zoneCloseAtt}
                            (cont. ${s.contZoneCloseMade}/${s.contZoneCloseAtt})
                            · Mid ${s.zoneMidMade}/${s.zoneMidAtt}
                            (cont. ${s.contZoneMidMade}/${s.contZoneMidAtt})
                            · Long ${s.zoneLongMade}/${s.zoneLongAtt}
                            (cont. ${s.contZoneLongMade}/${s.contZoneLongAtt})
                          </td>
                        </tr>` : '';
                      return `
                        <tr class="border-t border-gray-100">
                          <td class="py-1">
                            <button type="button" class="text-blue-700 hover:underline" data-view-player="${p.id}">${escapeHtml(p.name)}</button>
                          </td>
                          <td class="py-1 text-center text-xs text-gray-500">${stat.team}</td>
                          <td class="py-1 text-center">${s.points}</td>
                          <td class="py-1 text-center">${s.fgm}/${s.fga}</td>
                          <td class="py-1 text-center">${contCell}</td>
                          <td class="py-1 text-center">${rebCell}</td>
                          <td class="py-1 text-center">${naOr(tr.ast, s.ast)}</td>
                          <td class="py-1 text-center">${naOr(tr.stl, s.stl)}</td>
                          <td class="py-1 text-center">${naOr(tr.blk, s.blk)}</td>
                          <td class="py-1 text-center">${naOr(tr.to,  s.to)}</td>
                        </tr>
                        ${zoneRow}
                      `;
                    }).join('')}
                  </tbody>
                </table>
              </div>
              <div class="flex justify-end gap-4">
                <button type="button" class="text-xs text-blue-700 hover:underline" data-edit-game="${g.id}">Edit game</button>
                <button type="button" class="text-xs text-gray-400 hover:text-red-600" data-delete-game="${g.id}">Delete game</button>
              </div>
            </div>
          </details>
        `;
      }).join('')}
    </div>
  `;
}

function teamSummaryCard(team, t, finalScore, won, labelOverride) {
  const fgPct = t.fga ? (t.fgm / t.fga * 100).toFixed(1) + '%' : '–';
  const contPct = t.contAtt ? (t.contMade / t.contAtt * 100).toFixed(1) + '%' : '–';
  const tr = t.tracked || { contested: true, rebounds: true, ast: true, stl: true, blk: true, to: true };
  const contStr = tr.contested ? `${t.contMade}/${t.contAtt} (${contPct})` : NA_HTML;
  const orebStr = tr.rebounds  ? `${t.oreb}` : NA_HTML;
  const drebStr = tr.rebounds  ? `${t.dreb}` : NA_HTML;
  const rebStr  = tr.rebounds  ? `${t.reb}`  : NA_HTML;
  const astStr  = tr.ast ? `${t.ast}` : NA_HTML;
  const stlStr  = tr.stl ? `${t.stl}` : NA_HTML;
  const blkStr  = tr.blk ? `${t.blk}` : NA_HTML;
  const toStr   = tr.to  ? `${t.to}`  : NA_HTML;
  return `
    <div class="border ${won ? 'border-green-200 bg-green-50/60' : 'border-gray-200 bg-gray-50'} rounded-lg p-3">
      <div class="flex items-center justify-between mb-1">
        <span class="font-medium">${labelOverride || ('Team ' + team)}</span>
        <span class="tabular-nums font-semibold">${finalScore} pts</span>
      </div>
      <div class="text-gray-600 grid grid-cols-2 gap-x-3 gap-y-0.5">
        <div>FG: ${t.fgm}/${t.fga} (${fgPct})</div>
        <div>Contested: ${contStr}</div>
        <div>OREB: ${orebStr} · DREB: ${drebStr}</div>
        <div>REB: ${rebStr}</div>
        <div>AST: ${astStr} · STL: ${stlStr}</div>
        <div>BLK: ${blkStr} · TO: ${toStr}</div>
      </div>
    </div>
  `;
}

function wireGames() {
  document.querySelectorAll('button[data-go]').forEach(btn => {
    btn.addEventListener('click', () => go({ name: btn.dataset.go }));
  });
  const filterSel = document.getElementById('games-season-filter');
  if (filterSel) {
    filterSel.addEventListener('change', () => {
      view.seasonFilter = filterSel.value;
      render();
    });
  }
  document.querySelectorAll('button[data-view-player]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      go({ name: 'player', playerId: btn.dataset.viewPlayer });
    });
  });
  document.querySelectorAll('button[data-edit-game]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const game = state.games.find(g => g.id === btn.dataset.editGame);
      if (!game) return;
      logForm = gameToLogForm(game);
      go({ name: 'log' });
    });
  });

  document.querySelectorAll('button[data-delete-game]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      if (!confirm('Delete this game?')) return;
      state.games = state.games.filter(g => g.id !== btn.dataset.deleteGame);
      saveState();
      render();
    });
  });
}

// ============================================================
// VIEW: Player detail
// ============================================================
// Aggregate a list of {game, stat} records into the summary needed by the player detail view.
// Returned object is also used by the season comparison view.
function aggregatePlayerStats(gamesAndStats) {
  const sorted = [...gamesAndStats].sort((a, b) => {
    const dd = +new Date(a.game.playedAt) - +new Date(b.game.playedAt);
    return dd !== 0 ? dd : (a.game.order || 1) - (b.game.order || 1);
  });
  const gp = sorted.length;
  const totals = {
    points: 0, fgm: 0, fga: 0,
    shortMade: 0, shortAtt: 0,
    longMade: 0, longAtt: 0,
    contMade: 0, contAtt: 0,
    contShortMade: 0, contShortAtt: 0,
    contLongMade: 0, contLongAtt: 0,
    offReb: 0, defReb: 0, reb: 0,
    ast: 0, stl: 0, blk: 0, to: 0,
    // Zones
    zoneCloseMade: 0, zoneCloseAtt: 0,
    zoneMidMade:   0, zoneMidAtt:   0,
    zoneLongMade:  0, zoneLongAtt:  0,
    contZoneCloseMade: 0, contZoneCloseAtt: 0,
    contZoneMidMade:   0, contZoneMidAtt:   0,
    contZoneLongMade:  0, contZoneLongAtt:  0,
  };
  const trackedGp = { contested: 0, rebounds: 0, ast: 0, stl: 0, blk: 0, to: 0, zones: 0 };
  let teamOrebSum = 0, teamDrebSum = 0, teamRebSum = 0;
  const scoringsUsed = new Set();
  for (const x of sorted) {
    const s = statShape(x.stat, x.game);
    const t = getTracked(x.game);
    scoringsUsed.add(x.game.scoring || '1-2');
    totals.points += s.points;
    totals.fgm += s.fgm; totals.fga += s.fga;
    totals.shortMade += s.shortMade; totals.shortAtt += s.shortAtt;
    totals.longMade  += s.longMade;  totals.longAtt  += s.longAtt;
    if (t.contested) {
      trackedGp.contested++;
      totals.contMade += s.contMade; totals.contAtt += s.contAtt;
      totals.contShortMade += s.contShortMade; totals.contShortAtt += s.contShortAtt;
      totals.contLongMade  += s.contLongMade;  totals.contLongAtt  += s.contLongAtt;
    }
    if (t.rebounds) {
      trackedGp.rebounds++;
      totals.offReb += s.offReb; totals.defReb += s.defReb; totals.reb += s.reb;
      const tt = teamTotals(x.game, x.stat.team);
      teamOrebSum += tt.oreb; teamDrebSum += tt.dreb; teamRebSum += tt.reb;
    }
    if (t.ast) { trackedGp.ast++; totals.ast += s.ast; }
    if (t.stl) { trackedGp.stl++; totals.stl += s.stl; }
    if (t.blk) { trackedGp.blk++; totals.blk += s.blk; }
    if (t.to)  { trackedGp.to++;  totals.to  += s.to;  }
    if (t.zones) {
      trackedGp.zones++;
      totals.zoneCloseMade += s.zoneCloseMade; totals.zoneCloseAtt += s.zoneCloseAtt;
      totals.zoneMidMade   += s.zoneMidMade;   totals.zoneMidAtt   += s.zoneMidAtt;
      totals.zoneLongMade  += s.zoneLongMade;  totals.zoneLongAtt  += s.zoneLongAtt;
      totals.contZoneCloseMade += s.contZoneCloseMade; totals.contZoneCloseAtt += s.contZoneCloseAtt;
      totals.contZoneMidMade   += s.contZoneMidMade;   totals.contZoneMidAtt   += s.contZoneMidAtt;
      totals.contZoneLongMade  += s.contZoneLongMade;  totals.contZoneLongAtt  += s.contZoneLongAtt;
    }
  }
  const wlt = (() => {
    let w = 0, l = 0, t = 0;
    for (const x of sorted) {
      const gw = getWinner(x.game);
      if (gw === 'Tie') { t++; continue; }
      (x.stat.team === gw) ? w++ : l++;
    }
    return { w, l, t };
  })();
  return { sorted, gp, totals, trackedGp, teamOrebSum, teamDrebSum, teamRebSum, scoringsUsed, ...wlt };
}

function renderPlayerDetail(playerId) {
  const player = byId(playerId);
  if (!player) {
    return `<div class="text-sm text-gray-600">Player not found. <button type="button" class="text-blue-700 hover:underline" data-go="players">Back</button></div>`;
  }

  const allMyGames = playerGames(player.id);
  if (allMyGames.length === 0) {
    return `
      <div class="space-y-4">
        ${playerHeader(player, 0, 0, 0, 0, 0)}
        <div class="border border-dashed border-gray-300 rounded-lg p-8 text-center text-sm text-gray-600">
          No games for ${escapeHtml(player.name)} yet. Log a game on the "Log game" tab.
        </div>
      </div>
    `;
  }

  // Apply season filter from view state.
  const filter = view.seasonFilter || '__all__';
  const filteredGames = allMyGames.filter(x => {
    if (filter === '__all__')  return true;
    if (filter === '__none__') return !x.game.seasonId;
    return x.game.seasonId === filter;
  });

  if (filteredGames.length === 0) {
    return `
      <div class="space-y-4">
        ${playerHeader(player, 0, 0, 0, 0, 0)}
        ${seasonFilterBar(player, filter, allMyGames)}
        <div class="border border-dashed border-gray-300 rounded-lg p-8 text-center text-sm text-gray-600">
          No games for ${escapeHtml(player.name)} in this season.
        </div>
        ${comparisonSection(player, allMyGames)}
      </div>
    `;
  }

  const sorted = [...filteredGames].sort((a, b) => {
    const dd = +new Date(a.game.playedAt) - +new Date(b.game.playedAt);
    return dd !== 0 ? dd : (a.game.order || 1) - (b.game.order || 1);
  });
  const gp = sorted.length;
  const totals = {
    points: 0, fgm: 0, fga: 0,
    shortMade: 0, shortAtt: 0,
    longMade: 0, longAtt: 0,
    contMade: 0, contAtt: 0,
    contShortMade: 0, contShortAtt: 0,
    contLongMade: 0, contLongAtt: 0,
    offReb: 0, defReb: 0, reb: 0,
    ast: 0, stl: 0, blk: 0, to: 0,
    // Zones (parallel breakdown)
    zoneCloseMade: 0, zoneCloseAtt: 0,
    zoneMidMade:   0, zoneMidAtt:   0,
    zoneLongMade:  0, zoneLongAtt:  0,
    contZoneCloseMade: 0, contZoneCloseAtt: 0,
    contZoneMidMade:   0, contZoneMidAtt:   0,
    contZoneLongMade:  0, contZoneLongAtt:  0,
  };
  // Per-stat-group: how many of this player's games actually tracked it.
  // Shooting (fg, points, short/long) is always tracked.
  const trackedGp = { contested: 0, rebounds: 0, ast: 0, stl: 0, blk: 0, to: 0, zones: 0 };
  // Team-share rebound denominators: total rebounds the player's team grabbed in games where rebounds were tracked.
  let teamOrebSum = 0, teamDrebSum = 0, teamRebSum = 0;
  // Track scoring rules used so we can label shooting cards.
  const scoringsUsed = new Set();
  for (const x of sorted) {
    const s = statShape(x.stat, x.game);
    const t = getTracked(x.game);
    scoringsUsed.add(x.game.scoring || '1-2');
    // Shooting + points: always counted.
    totals.points += s.points;
    totals.fgm += s.fgm; totals.fga += s.fga;
    totals.shortMade += s.shortMade; totals.shortAtt += s.shortAtt;
    totals.longMade  += s.longMade;  totals.longAtt  += s.longAtt;
    if (t.contested) {
      trackedGp.contested++;
      totals.contMade += s.contMade; totals.contAtt += s.contAtt;
      totals.contShortMade += s.contShortMade; totals.contShortAtt += s.contShortAtt;
      totals.contLongMade  += s.contLongMade;  totals.contLongAtt  += s.contLongAtt;
    }
    if (t.rebounds) {
      trackedGp.rebounds++;
      totals.offReb += s.offReb; totals.defReb += s.defReb; totals.reb += s.reb;
      // Sum the player's team's rebounds in this game (denominator for team-share %).
      const tt = teamTotals(x.game, x.stat.team);
      teamOrebSum += tt.oreb; teamDrebSum += tt.dreb; teamRebSum += tt.reb;
    }
    if (t.ast) { trackedGp.ast++; totals.ast += s.ast; }
    if (t.stl) { trackedGp.stl++; totals.stl += s.stl; }
    if (t.blk) { trackedGp.blk++; totals.blk += s.blk; }
    if (t.to)  { trackedGp.to++;  totals.to  += s.to;  }
    if (t.zones) {
      trackedGp.zones++;
      totals.zoneCloseMade += s.zoneCloseMade; totals.zoneCloseAtt += s.zoneCloseAtt;
      totals.zoneMidMade   += s.zoneMidMade;   totals.zoneMidAtt   += s.zoneMidAtt;
      totals.zoneLongMade  += s.zoneLongMade;  totals.zoneLongAtt  += s.zoneLongAtt;
      totals.contZoneCloseMade += s.contZoneCloseMade; totals.contZoneCloseAtt += s.contZoneCloseAtt;
      totals.contZoneMidMade   += s.contZoneMidMade;   totals.contZoneMidAtt   += s.contZoneMidAtt;
      totals.contZoneLongMade  += s.contZoneLongMade;  totals.contZoneLongAtt  += s.contZoneLongAtt;
    }
  }

  // Pick shot-type labels. If all the player's games used the same scoring, use specific
  // labels (1PT/2PT or 2PT/3PT). If mixed, fall back to generic Short/Long.
  let shortLbl = 'Short', longLbl = 'Long';
  if (scoringsUsed.size === 1) {
    const v = pointValues([...scoringsUsed][0]);
    shortLbl = `${v.short}PT`;
    longLbl  = `${v.long}PT`;
  }

  const per = k => gp ? totals[k] / gp : 0;
  // Per-game average that only divides by games where the stat was tracked.
  const perTracked = (k, group) => trackedGp[group] ? totals[k] / trackedGp[group] : null;
  const pct = (m, a) => a ? (m / a * 100) : 0;
  const fmtAvg = (v, digits = 1) => v === null ? NA_HTML : v.toFixed(digits);

  function outcome({ stat, game }) {
    const w = getWinner(game);
    if (w === 'Tie') return 'T';
    return stat.team === w ? 'W' : 'L';
  }
  const wins   = sorted.filter(x => outcome(x) === 'W').length;
  const losses = sorted.filter(x => outcome(x) === 'L').length;
  const ties   = sorted.filter(x => outcome(x) === 'T').length;
  const winPct = gp ? (wins / gp) * 100 : 0;

  const hasNewData = sorted.some(x => statShape(x.stat, x.game).isNew);

  const rebSub = hasNewData && trackedGp.rebounds > 0
    ? `O ${fmtAvg(perTracked('offReb','rebounds'))} · D ${fmtAvg(perTracked('defReb','rebounds'))}`
    : null;

  const baseMetrics = [
    { label: 'Points / game',    value: per('points').toFixed(1) },
    { label: 'FG%',              value: pct(totals.fgm, totals.fga).toFixed(1) + '%', sub: `${totals.fgm} / ${totals.fga}` },
    { label: 'Rebounds / game',  value: fmtAvg(perTracked('reb','rebounds')), sub: rebSub, hint: trackedGp.rebounds < gp ? `${trackedGp.rebounds}/${gp} games tracked` : null },
    { label: 'Assists / game',   value: fmtAvg(perTracked('ast','ast')), hint: trackedGp.ast < gp ? `${trackedGp.ast}/${gp} games tracked` : null },
    { label: 'Steals / game',    value: fmtAvg(perTracked('stl','stl')), hint: trackedGp.stl < gp ? `${trackedGp.stl}/${gp} games tracked` : null },
    { label: 'Blocks / game',    value: fmtAvg(perTracked('blk','blk')), hint: trackedGp.blk < gp ? `${trackedGp.blk}/${gp} games tracked` : null },
    { label: 'Turnovers / game', value: fmtAvg(perTracked('to','to')),   hint: trackedGp.to  < gp ? `${trackedGp.to}/${gp} games tracked`  : null },
    { label: 'Win %',            value: winPct.toFixed(1) + '%' },
  ];

  const contestedAvailable = hasNewData && trackedGp.contested > 0;
  const contHint = contestedAvailable && trackedGp.contested < gp ? `${trackedGp.contested}/${gp} games tracked` : null;
  const shootingBreakdown = hasNewData ? [
    { label: 'Total FG%', value: pct(totals.fgm, totals.fga).toFixed(1) + '%', sub: `${totals.fgm}/${totals.fga}` },
    { label: `${shortLbl} FG%`, value: pct(totals.shortMade, totals.shortAtt).toFixed(1) + '%', sub: `${totals.shortMade}/${totals.shortAtt}` },
    { label: `${longLbl} FG%`,  value: pct(totals.longMade,  totals.longAtt ).toFixed(1) + '%', sub: `${totals.longMade}/${totals.longAtt}` },
    {
      label: `Cont. ${shortLbl} FG%`,
      value: contestedAvailable ? pct(totals.contShortMade, totals.contShortAtt).toFixed(1) + '%' : NA_HTML,
      sub:   contestedAvailable ? `${totals.contShortMade}/${totals.contShortAtt}` : null,
      hint:  contHint,
    },
    {
      label: `Cont. ${longLbl} FG%`,
      value: contestedAvailable ? pct(totals.contLongMade, totals.contLongAtt).toFixed(1) + '%' : NA_HTML,
      sub:   contestedAvailable ? `${totals.contLongMade}/${totals.contLongAtt}` : null,
      hint:  contHint,
    },
    {
      label: 'Contested FG% (overall)',
      value: contestedAvailable ? pct(totals.contMade, totals.contAtt).toFixed(1) + '%' : NA_HTML,
      sub:   contestedAvailable ? `${totals.contMade}/${totals.contAtt}` : null,
      hint:  contHint,
    },
  ] : [];

  // Shot zones — parallel breakdown of where on the court shots came from.
  const zonesAvailable = hasNewData && trackedGp.zones > 0;
  const zoneHint = zonesAvailable && trackedGp.zones < gp ? `${trackedGp.zones}/${gp} games tracked` : null;
  const zoneBreakdown = zonesAvailable ? [
    {
      label: 'Close FG%',
      value: totals.zoneCloseAtt ? pct(totals.zoneCloseMade, totals.zoneCloseAtt).toFixed(1) + '%' : NA_HTML,
      sub: `${totals.zoneCloseMade}/${totals.zoneCloseAtt}`,
      hint: zoneHint,
    },
    {
      label: 'Mid FG%',
      value: totals.zoneMidAtt ? pct(totals.zoneMidMade, totals.zoneMidAtt).toFixed(1) + '%' : NA_HTML,
      sub: `${totals.zoneMidMade}/${totals.zoneMidAtt}`,
      hint: zoneHint,
    },
    {
      label: 'Long FG%',
      value: totals.zoneLongAtt ? pct(totals.zoneLongMade, totals.zoneLongAtt).toFixed(1) + '%' : NA_HTML,
      sub: `${totals.zoneLongMade}/${totals.zoneLongAtt}`,
      hint: zoneHint,
    },
    {
      label: 'Cont. Close FG%',
      value: totals.contZoneCloseAtt ? pct(totals.contZoneCloseMade, totals.contZoneCloseAtt).toFixed(1) + '%' : NA_HTML,
      sub: `${totals.contZoneCloseMade}/${totals.contZoneCloseAtt}`,
      hint: zoneHint,
    },
    {
      label: 'Cont. Mid FG%',
      value: totals.contZoneMidAtt ? pct(totals.contZoneMidMade, totals.contZoneMidAtt).toFixed(1) + '%' : NA_HTML,
      sub: `${totals.contZoneMidMade}/${totals.contZoneMidAtt}`,
      hint: zoneHint,
    },
    {
      label: 'Cont. Long FG%',
      value: totals.contZoneLongAtt ? pct(totals.contZoneLongMade, totals.contZoneLongAtt).toFixed(1) + '%' : NA_HTML,
      sub: `${totals.contZoneLongMade}/${totals.contZoneLongAtt}`,
      hint: zoneHint,
    },
  ] : [];

  // Rebound % = player's share of their team's rebounds across games where rebounds were tracked.
  const rebsAvailable = hasNewData && trackedGp.rebounds > 0;
  const rebHint = rebsAvailable && trackedGp.rebounds < gp ? `${trackedGp.rebounds}/${gp} games tracked` : null;
  const reboundBreakdown = rebsAvailable ? [
    {
      label: 'Off. rebound %',
      value: teamOrebSum ? pct(totals.offReb, teamOrebSum).toFixed(1) + '%' : NA_HTML,
      sub: `${totals.offReb} of ${teamOrebSum} team OREB`,
      hint: rebHint,
    },
    {
      label: 'Def. rebound %',
      value: teamDrebSum ? pct(totals.defReb, teamDrebSum).toFixed(1) + '%' : NA_HTML,
      sub: `${totals.defReb} of ${teamDrebSum} team DREB`,
      hint: rebHint,
    },
    {
      label: 'Total rebound %',
      value: teamRebSum ? pct(totals.reb, teamRebSum).toFixed(1) + '%' : NA_HTML,
      sub: `${totals.reb} of ${teamRebSum} team REB`,
      hint: rebHint,
    },
  ] : [];

  // Games that have any FG attempts at all — used to decide whether to show the chart section.
  const hasFgData = sorted.filter(x => statShape(x.stat, x.game).fga > 0).length >= 2;

  // Date-level counts so the game log table can show a "#N" badge when multiple games share a date.
  const playerDateCounts = new Map();
  for (const x of sorted) {
    const dk = x.game.playedAt.slice(0, 10);
    playerDateCounts.set(dk, (playerDateCounts.get(dk) || 0) + 1);
  }

  return `
    <div class="space-y-6">
      ${playerHeader(player, gp, wins, losses, ties, winPct)}
      ${seasonFilterBar(player, filter, allMyGames)}

      <section>
        <div class="section-h mb-2">Per game</div>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
          ${baseMetrics.map(m => metricCard(m)).join('')}
        </div>
      </section>

      ${shootingBreakdown.length > 0 ? `
        <section>
          <div class="section-h mb-2">Shooting breakdown</div>
          <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
            ${shootingBreakdown.map(m => metricCard(m)).join('')}
          </div>
        </section>
      ` : ''}

      ${reboundBreakdown.length > 0 ? `
        <section>
          <div class="section-h mb-2">Rebounding breakdown</div>
          <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
            ${reboundBreakdown.map(m => metricCard(m)).join('')}
          </div>
          <p class="text-[11px] text-gray-400 mt-2">Percentages are your share of your team's rebounds in games where rebounds were tracked.</p>
        </section>
      ` : ''}

      ${zoneBreakdown.length > 0 ? `
        <section>
          <div class="section-h mb-2">Shot zone breakdown <span class="text-[11px] font-normal text-gray-400 normal-case tracking-normal">(parallel — separate from FG% above)</span></div>
          <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
            ${zoneBreakdown.map(m => metricCard(m)).join('')}
          </div>
          <p class="text-[11px] text-gray-400 mt-2">Tracked separately from total shooting. Use this to see which areas of the court you score from best.</p>
        </section>
      ` : ''}

      ${hasFgData ? `
        <section class="bg-white border border-gray-200 rounded-lg p-4">
          <div class="flex items-center justify-between gap-2 mb-2">
            <div class="section-h">Shooting % trend</div>
            <div class="flex gap-1" id="chart-view-tabs">
              ${['game', 'day'].map(v => {
                const active = (view.chartView || 'game') === v;
                const lbl = v === 'game' ? 'Per game' : 'Per day';
                return `<button type="button" data-chart-view="${v}"
                  class="px-2.5 py-1 rounded text-xs font-medium transition-colors ${active ? 'bg-gray-700 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}">
                  ${lbl}
                </button>`;
              }).join('')}
            </div>
          </div>
          <div class="flex flex-wrap gap-1.5 mb-3" id="chart-stat-tabs">
            ${[
              { key: 'total',     label: 'Total FG%',            show: true },
              { key: 'short',     label: shortLbl + ' FG%',      show: hasNewData },
              { key: 'long',      label: longLbl + ' FG%',       show: hasNewData },
              { key: 'contShort', label: 'Cont. ' + shortLbl,    show: hasNewData && contestedAvailable },
              { key: 'contLong',  label: 'Cont. ' + longLbl,     show: hasNewData && contestedAvailable },
            ].filter(t => t.show).map(t => {
              const active = (view.chartStat || 'total') === t.key;
              return `<button type="button" data-chart-stat="${t.key}"
                class="px-3 py-1 rounded text-xs font-medium transition-colors ${active ? 'bg-indigo-700 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}">
                ${t.label}
              </button>`;
            }).join('')}
          </div>
          <div id="chart-no-data" class="hidden text-sm text-gray-400 text-center py-8">No data for this stat type yet</div>
          <div style="height: 220px;"><canvas id="trend-chart"></canvas></div>
        </section>
      ` : ''}

      <section>
        <div class="section-h mb-2">Game log</div>
        <div class="bg-white border border-gray-200 rounded-lg overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="bg-gray-50 text-xs text-gray-600">
              <tr>
                <th class="text-left px-3 py-2 font-medium">Date</th>
                <th class="px-2 py-2 font-medium">Fmt</th>
                <th class="px-2 py-2 font-medium">W/L</th>
                <th class="px-2 py-2 font-medium">PTS</th>
                <th class="px-2 py-2 font-medium">FG</th>
                <th class="px-2 py-2 font-medium" title="Contested">Cont</th>
                <th class="px-2 py-2 font-medium" title="Off / Def / Total">REB</th>
                <th class="px-2 py-2 font-medium">AST</th>
                <th class="px-2 py-2 font-medium">STL</th>
                <th class="px-2 py-2 font-medium">BLK</th>
                <th class="px-2 py-2 font-medium">TO</th>
              </tr>
            </thead>
            <tbody>
              ${[...sorted].reverse().map(x => {
                const s = statShape(x.stat, x.game);
                const t = getTracked(x.game);
                const r = outcome(x);
                const cls = r === 'W' ? 'text-green-700' : r === 'L' ? 'text-red-700' : 'text-gray-500';
                const rebCell  = !t.rebounds  ? NA_HTML : (s.isNew ? `${s.offReb}/${s.defReb}/${s.reb}` : `${s.reb}`);
                const contCell = !t.contested ? NA_HTML : (s.isNew ? `${s.contMade}/${s.contAtt}` : '—');
                return `
                  <tr class="border-t border-gray-100">
                    <td class="px-3 py-1.5 text-gray-600">
                      ${new Date(x.game.playedAt).toLocaleDateString()}
                      ${(playerDateCounts.get(x.game.playedAt.slice(0,10)) || 1) > 1 ? `<span class="ml-1 text-[10px] font-medium text-indigo-600 bg-indigo-50 border border-indigo-200 rounded px-1">G${x.game.order||1}</span>` : ''}
                    </td>
                    <td class="px-2 py-1.5 text-center">${x.game.format}</td>
                    <td class="px-2 py-1.5 text-center font-medium ${cls}">${r}</td>
                    <td class="px-2 py-1.5 text-center">${s.points}</td>
                    <td class="px-2 py-1.5 text-center">${s.fgm}/${s.fga}</td>
                    <td class="px-2 py-1.5 text-center">${contCell}</td>
                    <td class="px-2 py-1.5 text-center">${rebCell}</td>
                    <td class="px-2 py-1.5 text-center">${naOr(t.ast, s.ast)}</td>
                    <td class="px-2 py-1.5 text-center">${naOr(t.stl, s.stl)}</td>
                    <td class="px-2 py-1.5 text-center">${naOr(t.blk, s.blk)}</td>
                    <td class="px-2 py-1.5 text-center">${naOr(t.to,  s.to)}</td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        </div>
      </section>

      ${comparisonSection(player, allMyGames)}
    </div>
  `;
}

function seasonFilterBar(player, currentFilter, allMyGames) {
  const counts = new Map();
  let noneCount = 0;
  for (const x of allMyGames) {
    if (!x.game.seasonId) noneCount++;
    else counts.set(x.game.seasonId, (counts.get(x.game.seasonId) || 0) + 1);
  }
  // Only show non-empty options.
  const seasonOpts = state.seasons
    .filter(s => counts.has(s.id))
    .map(s => `<option value="${s.id}" ${currentFilter===s.id?'selected':''}>${escapeHtml(s.name)} (${counts.get(s.id)})</option>`);
  // If there are no seasons at all that this player has games in, hide the filter entirely.
  if (seasonOpts.length === 0 && noneCount === allMyGames.length) {
    return '';
  }
  return `
    <div class="flex items-center gap-2 flex-wrap">
      <label class="text-xs text-gray-600 flex items-center gap-2">
        Season:
        <select id="player-season-filter" class="border border-gray-300 rounded px-2 py-1 text-sm">
          <option value="__all__" ${currentFilter==='__all__'?'selected':''}>All time (${allMyGames.length})</option>
          ${noneCount > 0 ? `<option value="__none__" ${currentFilter==='__none__'?'selected':''}>No season (${noneCount})</option>` : ''}
          ${seasonOpts.join('')}
        </select>
      </label>
    </div>
  `;
}

function comparisonSection(player, allMyGames) {
  // Build groups: one per season the player has games in, plus "No season" if any untagged.
  const groups = [];
  for (const s of state.seasons) {
    const g = allMyGames.filter(x => x.game.seasonId === s.id);
    if (g.length > 0) groups.push({ key: s.id, label: s.name, games: g });
  }
  const ungrouped = allMyGames.filter(x => !x.game.seasonId);
  if (ungrouped.length > 0) groups.push({ key: '__none__', label: 'No season', games: ungrouped });

  // Need at least 2 distinct buckets for a comparison to be informative.
  if (groups.length < 2) return '';

  // Always include "All time" as the first column for context.
  const cols = [{ key: '__all__', label: 'All time', games: allMyGames }, ...groups];
  const summaries = cols.map(c => ({ ...c, agg: aggregatePlayerStats(c.games) }));

  const pct = (m, a) => a ? (m / a * 100).toFixed(1) + '%' : '–';
  const avg = (n, d) => d ? (n / d).toFixed(1) : '–';

  const rows = [
    { label: 'Games',           f: ({agg}) => agg.gp },
    { label: 'W–L–T',           f: ({agg}) => `${agg.w}–${agg.l}–${agg.t}` },
    { label: 'Win %',           f: ({agg}) => agg.gp ? ((agg.w / agg.gp) * 100).toFixed(1) + '%' : '–' },
    { label: 'PTS / G',         f: ({agg}) => avg(agg.totals.points, agg.gp) },
    { label: 'FG%',             f: ({agg}) => pct(agg.totals.fgm, agg.totals.fga) },
    { label: 'Short FG%',       f: ({agg}) => pct(agg.totals.shortMade, agg.totals.shortAtt) },
    { label: 'Long FG%',        f: ({agg}) => pct(agg.totals.longMade,  agg.totals.longAtt)  },
    { label: 'Cont. FG%',       f: ({agg}) => agg.trackedGp.contested ? pct(agg.totals.contMade, agg.totals.contAtt) : 'N/A' },
    { label: 'REB / G',         f: ({agg}) => agg.trackedGp.rebounds ? avg(agg.totals.reb, agg.trackedGp.rebounds) : 'N/A' },
    { label: 'Total REB %',     f: ({agg}) => agg.trackedGp.rebounds && agg.teamRebSum ? pct(agg.totals.reb, agg.teamRebSum) : 'N/A' },
    { label: 'AST / G',         f: ({agg}) => agg.trackedGp.ast ? avg(agg.totals.ast, agg.trackedGp.ast) : 'N/A' },
    { label: 'STL / G',         f: ({agg}) => agg.trackedGp.stl ? avg(agg.totals.stl, agg.trackedGp.stl) : 'N/A' },
    { label: 'BLK / G',         f: ({agg}) => agg.trackedGp.blk ? avg(agg.totals.blk, agg.trackedGp.blk) : 'N/A' },
    { label: 'TO / G',          f: ({agg}) => agg.trackedGp.to  ? avg(agg.totals.to,  agg.trackedGp.to)  : 'N/A' },
  ];

  return `
    <section>
      <div class="section-h mb-2">Compare seasons</div>
      <div class="bg-white border border-gray-200 rounded-lg overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 text-xs text-gray-600">
            <tr>
              <th class="text-left px-3 py-2 font-medium">Stat</th>
              ${summaries.map(c => `<th class="px-2 py-2 font-medium">${escapeHtml(c.label)}</th>`).join('')}
            </tr>
          </thead>
          <tbody>
            ${rows.map(r => `
              <tr class="border-t border-gray-100">
                <td class="px-3 py-1.5 text-gray-700">${r.label}</td>
                ${summaries.map(c => {
                  const v = r.f(c);
                  const isNa = v === 'N/A';
                  return `<td class="px-2 py-1.5 text-center tabular-nums ${isNa ? 'text-gray-400 italic' : ''}">${v}</td>`;
                }).join('')}
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </section>
  `;
}
