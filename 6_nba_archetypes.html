<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Basketball — NBA Archetypes</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:#f8f8f6;color:#1a1a1a;padding:1.5rem}h1{font-size:22px;font-weight:500;margin-bottom:4px}.sub{font-size:13px;color:#666;margin-bottom:1.5rem}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px}.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden}.card-top{padding:1rem 1.25rem 0.75rem;border-bottom:1px solid #e5e7eb}.player-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}.av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0}.name{font-size:16px;font-weight:500}.arch{font-size:11px;color:#666;margin-top:2px}.comp-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}.comp-name{font-weight:500}.comp-why{font-size:12px;color:#555;line-height:1.5}.badge{display:inline-block;padding:2px 7px;border-radius:6px;font-size:10px;font-weight:500;margin-right:3px;margin-bottom:3px}.card-body{padding:0.75rem 1.25rem 1rem}.why{font-size:12px;color:#555;line-height:1.6;margin-bottom:10px}.comps-title{font-size:10px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}.ci{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px}.stat-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;padding-bottom:4px;border-bottom:1px solid #f5f5f5}</style></head><body>
<h1>NBA Archetypes & Comparisons</h1>
<div class="sub">Each player matched to 3 NBA comps based purely on their statistical profile — not how they look or play</div>
<div class="grid" id="cards"></div>
<script>
const players=[
  {name:"Erce",abbr:"ES",color:"#378ADD",arch:"Two-way engine / winning glue",stats:[["Win %","72.7%"],["Rebounds/g","14.3"],["Plus/minus","+3.67"],["PIE median","0.303"]],badges:["Two-way","Glue guy","Clutch","Winner"],why:"The clearest winner by every collective metric. +3.67 plus/minus, 72.7% win rate, best PIE. Doesn't dominate any single counting stat but controls games through rebounding, decision-making and positioning.",comps:[{name:"Draymond Green",color:"#FFC72C",why:"Leads in rebounding and assists relative to usage, lowest TO rate among volume players, 72.7% win rate. Like Draymond he is the reason his team wins."},{name:"Nikola Jokić",color:"#1D428A",why:"Rebounding + playmaking at the centre of everything. Erce grabs more offensive boards than anyone and facilitates at nearly 4 ast/g, making teammates better."},{name:"Bam Adebayo",color:"#98002E",why:"Two-way anchor who does the dirty work. Elite rebounder, versatile, clutch performer (62.5%). Team simply functions better when he is on the floor."}]},
  {name:"Albroz",abbr:"AL",color:"#639922",arch:"High-usage volume scorer",stats:[["Points/g","9.7 (most total)"],["2pt att share","58%"],["Pts share of team","55.1%"],["Win %","48.4%"]],badges:["Top scorer","Ball dominant","High usage"],why:"Leads in total points and dominates the ball — 55.1% of team scoring runs through him. Teams hover around .500 because his style doesn't naturally elevate teammates.",comps:[{name:"Julius Randle",color:"#006BB6",why:"High-usage scorer who puts up big numbers and leads in total production, but teams end up .500. Randle's Knicks hovered exactly like Albroz's teams do."},{name:"DeMar DeRozan",color:"#CE1141",why:"The mid-range volume scorer who gets his points but can't quite carry a team. Albroz's 2pt shot dominance (58%) mirrors DeRozan's preference for volume over efficiency."},{name:"Karl-Anthony Towns (early career)",color:"#236192",why:"High scorer who commands the ball, puts up strong counting stats, but teams consistently underperform the box score."}]},
  {name:"Marwan",abbr:"MA",color:"#E24B4A",arch:"Versatile scorer / defensive stopper",stats:[["Steals/g","1.38 (1st)"],["Blocks/g","0.72 (2nd)"],["PIE median","0.301"],["Clutch win%","45.5%"]],badges:["Defender","Stopper","Versatile","2-way"],why:"Leads in steals and ranks 2nd in blocks — widest defensive footprint. Scores efficiently across a balanced shot mix. PIE tied with Erce at the top. Weakness: clutch moments.",comps:[{name:"Mikal Bridges",color:"#1D428A",why:"Does everything — defends multiple positions, scores when needed, doesn't hurt the team — but isn't the answer in a grind. Marwan's 45.5% clutch rate mirrors the exact Bridges critique."},{name:"OG Anunoby",color:"#CE1141",why:"Long defensive presence who disrupts without the ball. Marwan's combination of steals and blocks mirrors OG's two-way versatility."},{name:"Kawhi Leonard (role player era)",color:"#C8102E",why:"Before Kawhi became a superstar he was a defensive specialist who scored efficiently without creating for himself — that's where Marwan sits."}]},
  {name:"Jalal",abbr:"JL",color:"#EF9F27",arch:"Glass-crasher / rim protector",stats:[["ORB/g","5.41 (1st)"],["Blocks/g","0.95 (1st)"],["Win %","30.4%"],["Plus/minus","-2.70 (worst)"]],badges:["ORB king","Shot blocker","30% win rate","Negative PM"],why:"Most physically imposing profile — leads in offensive rebounds, blocks, posted a 34-rebound single game. But -2.70 plus/minus and 30.4% win rate say teams consistently lose more with him.",comps:[{name:"Andre Drummond",color:"#C8102E",why:"The primary comp. Dominant rebounder, shot-blocker, physically imposing — but teams with him don't win. Opponents learn to neutralise him."},{name:"DeAndre Jordan (peak years)",color:"#C8102E",why:"All rim runs, offensive boards and shot-blocking, no shooting range. Jalal's 35% eFG% and near-total reliance on close-range attempts is pure DAJ."},{name:"Hassan Whiteside",color:"#98002E",why:"Elite counting stats — blocks and rebounds — that look spectacular on paper while the team loses. Whiteside's Heat teams consistently underperformed when he was the focal point."}]},
  {name:"Jackson",abbr:"JK",color:"#7F77DD",arch:"Pass-first point guard / facilitator",stats:[["Assists/g","4.14 (1st)"],["Turnovers/g","0.81 (lowest)"],["Clutch win%","100% (3/3)"],["2v2 win%","80%"]],badges:["Facilitator","Low TOs","Clutch","Floor general"],why:"Leads in assists, has fewest turnovers by a wide margin. Wins through reads and decisions rather than scoring. 100% clutch. Low eFG% (26.5%) is the main weakness.",comps:[{name:"Fred VanVleet",color:"#CE1141",why:"Elite facilitator with the lowest turnover rate, wins through intelligence not athleticism — but eFG% is the group's lowest, just like FVV who was never a shooting threat."},{name:"Rajon Rondo",color:"#007A33",why:"Purest passing archetype. Rondo's whole game was built on assist-to-turnover ratio and court vision. Jackson's 4.14 ast/g vs 0.81 to/g screams Rondo-style instincts."},{name:"Kyle Lowry",color:"#CE1141",why:"A winning facilitator who makes teammates better without being a scorer. Jackson's +0.57 plus/minus and 100% clutch rate at low scoring volume is that same profile."}]},
  {name:"Moe",abbr:"MO",color:"#1D9E75",arch:"System-dependent spark / 3v3 specialist",stats:[["3v3 win%","75%"],["2v2 win%","30%"],["Turnovers/g","2.46 (highest)"],["Plus/minus","-1.25"]],badges:["3v3 dominant","2v2 struggle","Improving trend","Highest TOs"],why:"The most context-dependent player. 75% in 3v3, 30% in 2v2. Same player, wildly different outcomes. Thrives when other players absorb defensive pressure.",comps:[{name:"Isaiah Thomas (2016-17)",color:"#007A33",why:"Devastating in the right system with the right teammates — but exposed when asked to do too much alone. Moe's 3v3 vs 2v2 split is exactly that system dependency."},{name:"Lou Williams",color:"#C8102E",why:"Ultimate bench spark who needs the right conditions. Lethal in a structured role but you wouldn't ask him to run an offence alone."},{name:"Jordan Clarkson",color:"#F9A01B",why:"Scorer who performs in the right environment but whose turnovers become problems when given more responsibility. Best in a defined role."}]},
  {name:"Fernando",abbr:"FN",color:"#D4537E",arch:"Defensive disruptor / energy man",stats:[["Steals/g","1.64 (1st overall)"],["Off reb share","48.2%"],["Clutch win%","100% (2/2)"],["Plus/minus","+0.82"]],badges:["Steals leader","Clutch 100%","Energy","Small sample"],why:"Small sample (11 games) but profile is clear: leads group in steals, half his boards are offensive, +0.82 plus/minus. Doesn't score much but disrupts constantly and shows up in clutch moments.",comps:[{name:"Patrick Beverley",color:"#5D2D91",why:"Defensive pest who disrupts, crashes boards, competes beyond his measurables. You wouldn't build around him but you want him on your team."},{name:"Draymond Green (defensive role only)",color:"#FFC72C",why:"Strip away Draymond's playmaking — steals, loose balls, offensive board tips — and that's Fernando's game. Maximum disruption, minimum scoring."},{name:"Marcus Smart",color:"#007A33",why:"Relentless defensive intensity, offensive rebounding above his size, clutch in big moments. Smart was never a scoring threat but his defensive presence changed games."}]},
];
document.getElementById("cards").innerHTML=players.map(p=>`<div class="card"><div class="card-top"><div class="player-row"><div class="av" style="background:${p.color}20;color:${p.color}">${p.abbr}</div><div><div class="name">${p.name}</div><div class="arch">${p.arch}</div></div></div><div>${p.badges.map(b=>`<span class="badge" style="background:${p.color}18;color:${p.color}">${b}</span>`).join("")}</div></div><div class="card-body">${p.stats.map(([l,v])=>`<div class="stat-row"><span style="color:#666">${l}</span><span style="font-weight:500">${v}</span></div>`).join("")}<p class="why" style="margin-top:10px">${p.why}</p><div class="comps-title">NBA comparisons (3 comps)</div>${p.comps.map((c,i)=>`<div class="ci"><div class="comp-dot" style="background:${c.color}"></div><div><span class="comp-name">${["Primary","Secondary","Tertiary"][i]}: ${c.name}</span> — <span class="comp-why">${c.why}</span></div></div>`).join("")}</div></div>`).join("");
</script></body></html>
